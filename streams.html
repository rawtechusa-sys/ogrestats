<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streams</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Lora:ital,wght@0,400;0,500;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.0.1/chartjs-plugin-zoom.min.js"></script>
<script>
  // The UMD zoom plugin auto-registers, but register explicitly as a fallback
  // (re-registering the same plugin is a no-op in Chart.js).
  if (window.Chart && window.ChartZoom) { try { Chart.register(window.ChartZoom); } catch (e) {} }
</script>
<link id="theme-css" rel="stylesheet" href="themes/bog-moss.css">
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: transparent;
    color: var(--text-primary);
    font-family: 'Lora', serif;
    font-size: 16px;
    line-height: 1.6;
    overflow: hidden;
  }

  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    height: 100vh;
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--bg-surface);
    border-right: 1px solid var(--border-default);
    overflow-y: auto;
    padding: 12px 0;
    position: relative;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: var(--bg-surface); }
  .sidebar::-webkit-scrollbar-thumb { background: var(--bg-raised); border-radius: 2px; }

  .sidebar-label {
    font-family: 'Rye', serif;
    font-size: 12px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    padding: 4px 16px 8px;
    text-transform: uppercase;
  }

  .stream-item {
    padding: 7px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s ease;
    position: relative;
    display: flex;
    align-items: baseline;
    gap: 6px;
    white-space: nowrap;
    overflow: hidden;
  }

  .stream-item:hover {
    background: rgba(100,180,60,0.07);
    border-left-color: rgba(100,180,60,0.3);
  }

  .stream-item.active {
    background: rgba(100,180,60,0.12);
    border-left-color: var(--accent);
  }

  /* White (Onion Layers) theme: replace the hardcoded green highlight with the
     theme's warm amber so the selection doesn't clash with the parchment. */
  html[data-theme="white"] .stream-item:hover {
    background: rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.10);
    border-left-color: rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.45);
  }
  html[data-theme="white"] .stream-item.active {
    background: rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.16);
  }

  /* Single-line entry: Date | Time | Length */
  .stream-item-date {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--accent);
  }

  .stream-item-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
  }

  .stream-item-length {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
  }

  .stream-item-sep {
    font-size: 12px;
    color: var(--border-default);
  }

  .sidebar-empty {
    padding: 16px;
    font-size: 15px;
    color: var(--text-muted);
    font-style: italic;
  }

  /* ── Content area ── */
  .content-area {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Stream title bar -- sits between tab bar and stats */
  .stream-title-bar {
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border-default);
    padding: 10px 24px;
    flex-shrink: 0;
    min-height: 44px;
    display: flex;
    align-items: center;
  }

  .stream-title-text {
    font-family: 'Rye', serif;
    font-size: 16px;
    color: var(--accent-bright);
    letter-spacing: 0.03em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    opacity: 0.9;
  }

  /* ── Main content ── */
  .main {
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    flex: 1;
  }

  .main::-webkit-scrollbar { width: 4px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--bg-raised); border-radius: 2px; }

  /* ── Stat cards ── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
  }

  .stat-card {
    background: var(--bg-panel);
    border: 1px solid var(--border-default);
    border-radius: 6px;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-bright), transparent);
    opacity: 0.4;
  }

  .stat-label {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace;
    display: block;
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: 'Rye', serif;
    font-size: 24px;
    color: var(--accent-bright);
    display: block;
    line-height: 1.1;
    text-shadow: 0 0 12px rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.3);
  }

  .stat-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 3px;
    display: block;
    font-style: italic;
  }

  /* ── Chart panel ── */
  .chart-panel {
    background: var(--bg-panel);
    border: 1px solid var(--border-default);
    border-radius: 6px;
    padding: 16px 20px;
  }

  .chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .chart-title-wrap {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .chart-title {
    font-family: 'Rye', serif;
    font-size: 14px;
    color: var(--text-primary);
    letter-spacing: 0.04em;
  }

  .chart-hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    opacity: 0.7;
    letter-spacing: 0.02em;
  }

  .chart-legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    color: var(--text-muted);
    font-family: 'Share Tech Mono', monospace;
  }

  .legend-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .legend-line   { width: 16px; height: 2px;  border-radius: 1px; flex-shrink: 0; }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    color: var(--text-muted);
    font-family: 'Share Tech Mono', monospace;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.15s ease;
  }

  .legend-item:hover { color: var(--accent); }
  .legend-item.hidden { opacity: 0.35; }

  .legend-divider {
    width: 1px;
    height: 14px;
    background: var(--border-default);
    flex-shrink: 0;
    margin: 0 2px;
  }

  .chart-wrap { position: relative; width: 100%; height: 400px; }

  /* ── Scrub-and-zoom scrollbar ── */
  .chart-scrollbar {
    position: relative;
    width: 100%;
    height: 16px;
    margin-top: 10px;
    background: var(--bg-panel);
    border: 1px solid var(--border-default);
    border-radius: 4px;
    cursor: pointer;
    user-select: none;
    touch-action: none;
  }
  .chart-scrollbar-thumb {
    position: absolute;
    top: -1px;
    bottom: -1px;
    left: 0;
    width: 100%;
    box-sizing: border-box;
    background: rgba(var(--accent-glow-r), var(--accent-glow-g), var(--accent-glow-b), 0.22);
    border: 1px solid var(--accent);
    border-radius: 4px;
    cursor: grab;
  }
  .chart-scrollbar-thumb:active { cursor: grabbing; }
  .chart-scrollbar-handle {
    position: absolute;
    top: -1px;
    bottom: -1px;
    width: 9px;
    cursor: ew-resize;
  }
  .chart-scrollbar-handle.left  { left: -1px; }
  .chart-scrollbar-handle.right { right: -1px; }
  .chart-scrollbar-handle::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 2px; height: 9px;
    background: var(--accent);
    border-radius: 1px;
    opacity: 0.85;
  }

  /* ── Donation table ── */
  .donations-panel {
    background: var(--bg-panel);
    border: 1px solid var(--border-default);
    border-radius: 6px;
    padding: 16px 20px;
  }

  .donations-title {
    font-family: 'Rye', serif;
    font-size: 14px;
    color: var(--text-primary);
    margin-bottom: 12px;
    letter-spacing: 0.04em;
  }

  .donations-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 15px;
  }

  .donations-table th {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: left;
    padding: 4px 8px 8px;
    border-bottom: 1px solid var(--border-default);
  }

  .donations-table td {
    padding: 8px 8px;
    border-bottom: 1px solid rgba(100,180,60,0.07);
    vertical-align: top;
  }

  .donations-table tr:last-child td { border-bottom: none; }

  .donations-table tr:hover td {
    background: rgba(100,180,60,0.05);
  }

  html[data-theme="white"] .donations-table td {
    border-bottom-color: rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.16);
  }
  html[data-theme="white"] .donations-table tr:hover td {
    background: rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.07);
  }

  .type-badge {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 2px 7px;
    border-radius: 3px;
    border: 1px solid;
  }

  .type-superchat  { color: #80c8a0; border-color: rgba(80,180,120,0.35);  background: rgba(40,120,70,0.2); }
  .type-membership { color: #80c8a0; border-color: rgba(80,180,120,0.25);  background: rgba(30,100,60,0.15); }
  .type-giftmembership { color: #80c8a0; border-color: rgba(80,180,120,0.25);  background: rgba(30,100,60,0.15); }
  .type-bits       { color: #b090d0; border-color: rgba(130,80,180,0.35);  background: rgba(90,50,140,0.2); }
  .type-giftsub    { color: #b090d0; border-color: rgba(130,80,180,0.25);  background: rgba(70,40,110,0.15); }
  .type-sub        { color: #b090d0; border-color: rgba(130,80,180,0.25);  background: rgba(70,40,110,0.15); }

  /* White (Onion Layers) theme: darker text on lighter fills for legibility. */
  html[data-theme="white"] .type-superchat,
  html[data-theme="white"] .type-membership,
  html[data-theme="white"] .type-giftmembership { color: #237046; border-color: rgba(35,112,70,0.45); background: rgba(35,112,70,0.13); }
  html[data-theme="white"] .type-bits,
  html[data-theme="white"] .type-giftsub,
  html[data-theme="white"] .type-sub { color: #54338a; border-color: rgba(90,58,140,0.45); background: rgba(90,58,140,0.13); }

  .amount-usd { font-family: 'Share Tech Mono', monospace; color: var(--accent); font-size: 14px; }
  .username   { color: var(--text-primary); }
  .ts-cell    { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--text-muted); white-space: nowrap; }
  .ts-link    { color: var(--accent); text-decoration: none; border-bottom: 1px dotted rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.4); transition: color 0.15s ease, border-color 0.15s ease; }
  .ts-link:hover { color: var(--accent-bright); border-bottom-color: var(--accent-bright); text-shadow: 0 0 8px rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.4); }
  .msg-cell   { font-family: 'Lora', serif; color: var(--text-muted); font-size: 14px; word-break: break-word; }

  /* ── States ── */
  .loading-state, .empty-state, .error-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text-muted);
    font-style: italic;
    font-size: 16px;
  }

  .loading-glyph {
    font-family: 'Rye', serif;
    font-size: 32px;
    color: var(--accent);
    animation: flicker 2s ease-in-out infinite;
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; text-shadow: 0 0 20px rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.6); }
    50%       { opacity: 0.7; text-shadow: 0 0 8px rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.2); }
  }

</style>
</head>
<body>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="loading-state" style="height:200px;">
      <span class="loading-glyph">~</span>
      <span>wading in...</span>
    </div>
  </nav>

  <div class="content-area">
    <div class="stream-title-bar">
      <span class="stream-title-text" id="streamTitle"></span>
    </div>
    <main class="main" id="main">
      <div class="empty-state">
        <span class="loading-glyph" style="font-size:40px;">☽</span>
        <span>select a stream from the list</span>
      </div>
    </main>
  </div>
</div>

<script src="config.js"></script>
<script>
const RAW = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${BRANCH}`;

let currentChart = null;

// ── Theme ─────────────────────────────────────────────────────────────────────
const THEMES = {
  green: { file: 'themes/bog-moss.css',      chartGrid: 'rgba(100,180,60,0.08)',   chartTick: '#4a7038', donBar: 'rgba(100,180,60,0.75)',   donBorder: '#96d45a', tooltipBg: '#0e160e', tooltipTitle: '#7ab84a', tooltipBody: '#b8c9a0', donTick: '#4a7038',  tooltipBorder: 'rgba(100,180,60,0.4)' },
  amber: { file: 'themes/firepit.css',        chartGrid: 'rgba(196,125,42,0.08)',   chartTick: '#7a6045', donBar: 'rgba(196,125,42,0.75)',   donBorder: '#e8952a', tooltipBg: '#1c150a', tooltipTitle: '#c47d2a', tooltipBody: '#c8a97a', donTick: '#8a6030',  tooltipBorder: 'rgba(196,125,42,0.4)' },
  grey:  { file: 'themes/dead-stone.css',     chartGrid: 'rgba(160,160,148,0.08)',  chartTick: '#606058', donBar: 'rgba(140,140,130,0.75)',  donBorder: '#b0b0a8', tooltipBg: '#141414', tooltipTitle: '#909088', tooltipBody: '#c0c0b8', donTick: '#606058',  tooltipBorder: 'rgba(160,160,148,0.4)' },
  void:  { file: 'themes/the-void.css',       chartGrid: 'rgba(255,255,255,0.08)',  chartTick: '#a0a0a0', donBar: 'rgba(200,200,200,0.75)',  donBorder: '#ffffff', tooltipBg: '#0a0a0a', tooltipTitle: '#ffffff', tooltipBody: '#f0f0f0', donTick: '#a0a0a0',  tooltipBorder: 'rgba(255,255,255,0.45)' },
  white: { file: 'themes/onion-layers.css',   chartGrid: 'rgba(120,92,38,0.14)',    chartTick: '#6a5731', donBar: 'rgba(160,109,28,0.80)',  donBorder: '#8a4d08', tooltipBg: '#fbf7ee', tooltipTitle: '#8a4d08', tooltipBody: '#2a2316', donTick: '#6a5731',  tooltipBorder: 'rgba(120,92,38,0.5)' },
};

function applyTheme(key) {
  const t = THEMES[key] || THEMES.green;
  document.getElementById('theme-css').href = t.file;
  document.documentElement.setAttribute('data-theme', key);
  if (currentChart) {
    currentChart.options.scales.yViewers.grid.color = t.chartGrid;
    currentChart.options.scales.x.grid.color = t.chartGrid;
    currentChart.options.scales.x.ticks.color = t.chartTick;
    currentChart.options.plugins.tooltip.backgroundColor = t.tooltipBg;
    currentChart.options.plugins.tooltip.titleColor = t.tooltipTitle;
    currentChart.options.plugins.tooltip.bodyColor = t.tooltipBody;
    currentChart.options.plugins.tooltip.borderColor = t.tooltipBorder;
    currentChart.update('none');
  }
}

// Apply theme from localStorage on load, then listen for live updates from parent
applyTheme(localStorage.getItem('swamp-theme') || 'green');
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'theme') applyTheme(e.data.key);
  // Live timezone switch: rebuild the sidebar dates and reload the selected stream.
  else if (e.data && e.data.type === 'timezone') loadStreamList();
});

// Forward mouse position to parent for roach/eye animations
document.addEventListener('mousemove', e => {
  try { window.parent.postMessage({ type: 'mousemove', x: e.clientX, y: e.clientY }, '*'); } catch(err) {}
});
document.addEventListener('mouseleave', () => {
  try { window.parent.postMessage({ type: 'mouseleave' }, '*'); } catch(err) {}
});

// ── Utilities ──────────────────────────────────────────────────────────────────
async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText} — ${url}`);
  return r.json();
}

async function fetchText(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${r.status} — ${url}`);
  return r.text();
}

function parseJSONL(text) {
  return text.trim().split('\n').filter(Boolean).map(l => {
    try { return JSON.parse(l); } catch { return null; }
  }).filter(Boolean);
}

function fmtDate(ts) {
  return new Date(ts * 1000).toLocaleDateString('en-US', withTZ({ month:'short', day:'numeric', year:'numeric' }));
}

function fmtTime(ts) {
  return new Date(ts * 1000).toLocaleTimeString('en-US', withTZ({ hour:'2-digit', minute:'2-digit' }));
}

function fmtDuration(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function elapsedSeconds(startTs, ts) {
  return Math.max(0, Math.floor(ts - startTs));
}

function fmtElapsed(startTs, ts) {
  const s = elapsedSeconds(startTs, ts);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return h > 0
    ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
    : `${m}:${String(sec).padStart(2,'0')}`;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Stream list ────────────────────────────────────────────────────────────────
async function loadStreamList() {
  const sidebar = document.getElementById('sidebar');
  try {
    const index = await fetchJSON(`${RAW}/data/streams/index.json`);

    if (index.length === 0) {
      sidebar.innerHTML = '<div class="sidebar-empty">no streams yet — check back after the next broadcast</div>';
      return;
    }

    let streams;
    if (typeof index[0] === 'object' && index[0] !== null) {
      // Fat index: each entry is {id, start_ts, end_ts, platforms} — everything
      // the sidebar renders is already here, so no per-stream metadata fetch.
      // The full metadata.json + events.jsonl load lazily on click (loadStream).
      streams = index.map(e => ({ id: e.id, meta: e }));
    } else {
      // Legacy string-array index: fall back to fetching each metadata.json.
      const metaResults = await Promise.allSettled(
        index.map(id => fetchJSON(`${RAW}/data/streams/${id}/metadata.json`))
      );
      streams = index.map((id, i) => ({
        id,
        meta: metaResults[i].status === 'fulfilled' ? metaResults[i].value : null,
      }));
    }

    // Newest-first by start_ts.
    streams.sort((a, b) => (b.meta?.start_ts ?? 0) - (a.meta?.start_ts ?? 0));

    sidebar.innerHTML = '<div class="sidebar-label">Streams</div>';

    for (const [idx, { id, meta }] of streams.entries()) {
      const div = document.createElement('div');
      div.className = 'stream-item' + (idx === 0 ? ' active' : '');
      div.dataset.id = id;

      let datePart = '—';
      let timePart = '';

      if (meta?.start_ts) {
        const utcDate = new Date(meta.start_ts * 1000);
        // MM/DD/YY (month/day/year), in the active timezone (see config.js withTZ).
        datePart = utcDate.toLocaleDateString('en-US', withTZ({
          month: '2-digit', day: '2-digit', year: '2-digit'
        }));
        // Time only, no timezone label.
        timePart = utcDate.toLocaleTimeString('en-US', withTZ({
          hour: 'numeric', minute: '2-digit'
        }));
      }

      const lengthPart = (meta?.end_ts && meta?.start_ts)
        ? fmtDuration(meta.end_ts - meta.start_ts) : '';

      div.innerHTML = `
        <span class="stream-item-date">${datePart}</span>
        <span class="stream-item-sep">|</span>
        <span class="stream-item-time">${timePart}</span>
        ${lengthPart ? `<span class="stream-item-sep">|</span><span class="stream-item-length">${lengthPart}</span>` : ''}
      `;

      div.addEventListener('click', () => {
        document.querySelectorAll('.stream-item').forEach(el => el.classList.remove('active'));
        div.classList.add('active');
        sessionStorage.setItem('selected-stream', id);
        // Reflect the selection in the URL so the view is shareable / deep-linkable
        // (e.g. the donation links on dents.html point here as streams.html#<id>).
        location.hash = id;
        loadStream(id);
      });

      sidebar.appendChild(div);
    }

    if (streams.length > 0) {
      // Deep-link priority: URL hash (#<stream_id>, e.g. from dents.html donation
      // links) first, then the last selection saved this session, then newest.
      const hashId = decodeURIComponent((location.hash || '').replace(/^#/, ''));
      const selected = (hashId && document.querySelector(`.stream-item[data-id="${CSS.escape(hashId)}"]`))
        ? hashId
        : sessionStorage.getItem('selected-stream');
      const selectedItem = selected && document.querySelector(`.stream-item[data-id="${CSS.escape(selected)}"]`);
      if (selectedItem) {
        document.querySelectorAll('.stream-item').forEach(el => el.classList.remove('active'));
        selectedItem.classList.add('active');
        selectedItem.scrollIntoView({ block: 'nearest' });
        sessionStorage.setItem('selected-stream', selected);
        loadStream(selected);
      } else {
        loadStream(streams[0].id);
      }
    }

  } catch (e) {
    sidebar.innerHTML = `<div class="sidebar-empty">couldn't reach the swamp<br><small>${e.message}</small></div>`;
  }
}

// ── Stream detail ──────────────────────────────────────────────────────────────
async function loadStream(streamId) {
  const main = document.getElementById('main');
  main.innerHTML = `<div class="loading-state"><span class="loading-glyph">~</span><span>wading in...</span></div>`;
  document.getElementById('streamTitle').textContent = '';

  try {
    const [meta, eventsText] = await Promise.all([
      fetchJSON(`${RAW}/data/streams/${streamId}/metadata.json`),
      fetchText(`${RAW}/data/streams/${streamId}/events.jsonl`),
    ]);

    if (meta.title) {
      document.getElementById('streamTitle').textContent = meta.title;
    }

    const events    = parseJSONL(eventsText);
    const snapshots = events.filter(e => e.event === 'viewer_snapshot');
    const donations = events.filter(e => e.event === 'donation');

    const startTs   = meta.start_ts;
    const endTs     = meta.end_ts;
    const duration  = (endTs && startTs) ? endTs - startTs : null;
    const peakYT    = snapshots.reduce((m, s) => Math.max(m, s.youtube || 0), 0);
    const peakTW    = snapshots.reduce((m, s) => Math.max(m, s.twitch  || 0), 0);
    const peakTotal = snapshots.reduce((m, s) => Math.max(m, (s.youtube || 0) + (s.twitch || 0)), 0);
    const totalUSD  = donations.reduce((s, d) => s + (d.amount_usd || 0), 0);
    const donCount  = donations.length;

    const platforms = meta.platforms || [];
    const hasYT = platforms.includes('youtube');
    const hasTW = platforms.includes('twitch');

    // Viewer-data availability is separate from platform membership: streams
    // that predate YouTube viewer collection store youtube as null for every
    // snapshot. Treat those as "no data" (N/A, no viewer line) rather than 0.
    const hasYTViewers = snapshots.some(s => s.youtube != null);
    const hasTWViewers = snapshots.some(s => s.twitch  != null);
    const hasViewers   = hasYTViewers || hasTWViewers;

    main.innerHTML = '';

    // ── Stat cards ──
    const grid = document.createElement('div');
    grid.className = 'stat-grid';

    function card(label, value, sub) {
      return `<div class="stat-card">
        <span class="stat-label">${label}</span>
        <span class="stat-value">${value}</span>
        ${sub ? `<span class="stat-sub">${sub}</span>` : ''}
      </div>`;
    }

    const bothViewers = hasYTViewers && hasTWViewers;
    let cards = '';
    cards += card('Duration',     duration ? fmtDuration(duration) : '—',  fmtDate(startTs));
    cards += card('Peak Viewers',
      hasViewers ? peakTotal.toLocaleString() : 'N/A',
      bothViewers ? `YT ${peakYT} · TW ${peakTW}` : '');
    cards += card('Total Raised', '$' + totalUSD.toFixed(2), `${donCount} donation${donCount !== 1 ? 's' : ''}`);

    const avgYT = snapshots.length ? Math.round(snapshots.reduce((s,x) => s + (x.youtube||0), 0) / snapshots.length) : 0;
    const avgTW = snapshots.length ? Math.round(snapshots.reduce((s,x) => s + (x.twitch ||0), 0) / snapshots.length) : 0;
    cards += card('Avg Viewers',
      hasViewers ? (avgYT + avgTW).toLocaleString() : 'N/A',
      bothViewers ? `YT ${avgYT} · TW ${avgTW}` : '');

    const peakActiveYT = snapshots.reduce((m, s) => Math.max(m, s.active_youtube_chatters || 0), 0);
    const peakActiveTW = snapshots.reduce((m, s) => Math.max(m, s.active_twitch_chatters  || 0), 0);
    const hasActiveYTData = snapshots.some(s => s.active_youtube_chatters != null);
    const hasActiveTWData = snapshots.some(s => s.active_twitch_chatters  != null);

    if (hasActiveYTData || hasActiveTWData) {
      const bothActive = hasActiveYTData && hasActiveTWData;
      const activeValue = bothActive
        ? (peakActiveYT + peakActiveTW).toLocaleString()
        : hasActiveYTData ? peakActiveYT.toLocaleString() : peakActiveTW.toLocaleString();
      const activeSub = bothActive ? `YT ${peakActiveYT} · TW ${peakActiveTW}` : '';
      cards += card('Peak Active Chatters', activeValue, activeSub);
    }

    grid.innerHTML = cards;
    main.appendChild(grid);

    // ── Combined chart ──
    if (snapshots.length > 0 || donations.length > 0) {
      const panel = document.createElement('div');
      panel.className = 'chart-panel';

      const hasChatRate = snapshots.some(s =>
        s.youtube_messages_per_minute != null || s.twitch_messages_per_minute != null
      );
      const hasActiveYT = hasYT && snapshots.some(s => s.active_youtube_chatters != null);
      const hasActiveTW = hasTW && snapshots.some(s => s.active_twitch_chatters != null);

      panel.innerHTML = `
        <div class="chart-header">
          <div class="chart-title-wrap">
            <span class="chart-title">Viewers &amp; Donations</span>
            <span class="chart-hint">scroll to zoom &middot; drag to pan &middot; double-click to reset</span>
          </div>
          <div class="chart-legend" id="chartLegend"></div>
        </div>
        <div class="chart-wrap">
          <canvas id="streamChart" role="img" aria-label="Viewer counts, donations and chat rate over stream duration"></canvas>
        </div>
        <div class="chart-scrollbar" id="chartScrollbar">
          <div class="chart-scrollbar-thumb" id="chartScrollbarThumb">
            <div class="chart-scrollbar-handle left"></div>
            <div class="chart-scrollbar-handle right"></div>
          </div>
        </div>`;
      main.appendChild(panel);

      buildChart(snapshots, donations, startTs, hasYTViewers, hasTWViewers, hasChatRate, hasActiveYT, hasActiveTW, hasYT, hasTW);
      buildLegend(hasYTViewers, hasTWViewers, hasChatRate, donations.length > 0, hasActiveYT, hasActiveTW, hasYT, hasTW);
    }

    // ── Donation log ──
    if (donations.length > 0) {
      const panel = document.createElement('div');
      panel.className = 'donations-panel';

      // Resolve the archive(s) this stream was broadcast to. A normal stream has
      // a single youtube_archive_id; a stream whose output broadcast split into
      // multiple videos carries a `segments` array of {archive_id, start_ts}, so
      // each donation can deep-link into whichever video was live at its moment.
      // A durable archive (archive_builder.py) also carries an archive_org_id
      // Internet Archive mirror used as a fallback, anchored at archive_start_ts.
      const segments = (Array.isArray(meta.segments) && meta.segments.length)
        ? [...meta.segments].sort((a, b) => a.start_ts - b.start_ts)
        : ((meta.youtube_archive_id || meta.archive_org_id)
            ? [{ archive_id: meta.youtube_archive_id || null,
                 archive_org_id: meta.archive_org_id || null,
                 start_ts: meta.archive_start_ts != null ? meta.archive_start_ts : startTs }]
            : []);

      // Prefer the YouTube copy; fall back to the Internet Archive mirror when the
      // YouTube id is absent (e.g. the upload was struck/removed). archive.org's
      // embed player honors ?start=<seconds> just like youtu.be honors ?t=.
      function buildVodLink(seg, tSec) {
        if (seg.archive_id)
          return `https://youtu.be/${encodeURIComponent(seg.archive_id)}?t=${tSec}`;
        if (seg.archive_org_id)
          return `https://archive.org/embed/${encodeURIComponent(seg.archive_org_id)}?start=${tSec}`;
        return null;
      }

      // The last segment that had started by ts, clamped to the first segment for
      // any donation predating all of them.
      function segmentFor(ts) {
        let chosen = segments[0] || null;
        for (const seg of segments) {
          if (seg.start_ts <= ts) chosen = seg;
          else break;
        }
        return chosen;
      }

      const sorted = [...donations].sort((a,b) => a.ts - b.ts);
      const rows = sorted.map(d => {
        const elapsedText = startTs ? fmtElapsed(startTs, d.ts) : fmtTime(d.ts);
        // The displayed time stays on the overall stream timeline; only the link
        // target is per-segment, so a post-split donation reads as its true stream
        // time but jumps to the correct video at its offset within that video.
        const seg = segmentFor(d.ts);
        let tsCell = elapsedText;
        if (seg && seg.start_ts != null) {
          const tSec = Math.max(0, Math.floor(d.ts - seg.start_ts));
          const href = buildVodLink(seg, tSec);
          if (href) {
            tsCell = `<a class="ts-link" href="${href}" target="_blank" rel="noopener noreferrer">${elapsedText}</a>`;
          }
        }
        const usd     = d.amount_usd != null ? `<span class="amount-usd">$${d.amount_usd.toFixed(2)}</span>` : '<span class="amount-usd">—</span>';
        const msg     = d.message ? `<span class="msg-cell" title="${d.message.replace(/"/g,'&quot;')}">${escHtml(d.message)}</span>` : '';
        return `<tr>
          <td class="ts-cell">${tsCell}</td>
          <td><span class="username">${escHtml((d.username || '').replace(/^@+/, ''))}</span></td>
          <td><span class="type-badge type-${d.type}">${d.type}</span></td>
          <td>${usd}</td>
          <td>${msg}</td>
        </tr>`;
      }).join('');

      panel.innerHTML = `
        <div class="donations-title">Donation Log</div>
        <table class="donations-table">
          <thead><tr>
            <th>Time</th><th>User</th><th>Type</th><th>Amount</th><th>Message</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
      main.appendChild(panel);
    }

  } catch (e) {
    main.innerHTML = `<div class="error-state"><span class="loading-glyph">✕</span><span>failed to load stream<br><small>${e.message}</small></span></div>`;
  }
}

// ── Chart ──────────────────────────────────────────────────────────────────────

// Dataset label constants -- used to match datasets in legend toggle and theme update
const DS = {
  YT_VIEWERS:       'YouTube Viewers',
  TW_VIEWERS:       'Twitch Viewers',
  TOTAL_VIEWERS:    'Total Viewers',
  DONATIONS:        'Donations',
  YT_CHAT:          'YouTube Chat',
  TW_CHAT:          'Twitch Chat',
  TOTAL_CHAT:       'Total Chat',
  YT_ACTIVE_CHATTERS: 'YT Active Chatters',
  TW_ACTIVE_CHATTERS: 'TW Active Chatters',
  TOTAL_ACTIVE_CHATTERS: 'Total Active Chatters',
};

// Canonical ordering for tooltip rows -- mirrors the legend grouping in
// buildLegend (Donations | Viewers | Active Chatters | Msg/Min, Total first).
const LEGEND_ORDER = [
  DS.DONATIONS,
  DS.TOTAL_VIEWERS, DS.YT_VIEWERS, DS.TW_VIEWERS,
  DS.TOTAL_ACTIVE_CHATTERS, DS.YT_ACTIVE_CHATTERS, DS.TW_ACTIVE_CHATTERS,
  DS.TOTAL_CHAT, DS.YT_CHAT, DS.TW_CHAT,
];

// Tooltip keys: Chart.js can't dash its built-in line glyph, but pointStyle
// accepts a canvas (drawPoint renders it verbatim). So we draw a small line
// with the dataset's exact color + dash pattern and use it as the key. Cached
// by color+dash so we don't rebuild one every tooltip render.
const _lineKeyCache = {};
function lineKeyCanvas(color, dash) {
  const pattern = (dash && dash.length) ? dash.join(',') : 'solid';
  const cacheKey = color + '|' + pattern;
  if (_lineKeyCache[cacheKey]) return _lineKeyCache[cacheKey];
  const w = 26, h = 10;
  const cv = document.createElement('canvas');
  cv.width = w; cv.height = h;
  const cx = cv.getContext('2d');
  cx.strokeStyle = color;
  cx.lineWidth = 2;
  cx.setLineDash((dash && dash.length) ? dash : []);
  cx.beginPath();
  cx.moveTo(1, h / 2);
  cx.lineTo(w - 1, h / 2);
  cx.stroke();
  _lineKeyCache[cacheKey] = cv;
  return cv;
}

// Persisted set of dataset labels the user has toggled off; survives stream changes.
const hiddenDatasets = new Set(
  JSON.parse(localStorage.getItem('stream-chart-hidden') || '[]')
);

// Show/hide each y-axis based on whether any of its datasets are currently visible.
function syncAxisDisplay() {
  if (!currentChart) return;
  const axisMap = {
    yViewers:        [DS.YT_VIEWERS, DS.TW_VIEWERS, DS.TOTAL_VIEWERS],
    yActiveChatters: [DS.YT_ACTIVE_CHATTERS, DS.TW_ACTIVE_CHATTERS, DS.TOTAL_ACTIVE_CHATTERS],
    yDonations:      [DS.DONATIONS],
    yChatRate:       [DS.YT_CHAT, DS.TW_CHAT, DS.TOTAL_CHAT],
  };
  for (const [axisId, labels] of Object.entries(axisMap)) {
    const anyVisible = labels.some(label => {
      const idx = currentChart.data.datasets.findIndex(d => d.label === label);
      return idx !== -1 && currentChart.isDatasetVisible(idx);
    });
    currentChart.options.scales[axisId].display = anyVisible;
  }
  currentChart.update('none');
}

// ── Smooth (non-snapping) y-axis auto-fit ───────────────────────────────────
// When the x-axis is zoomed/panned, Chart.js fits each y-axis to ONLY the points
// inside the visible x-window. That inclusion is binary, so the y-scale snaps the
// instant a tall/short point crosses the visible edge. To make the scale move
// continuously, smoothYExtent() computes each axis's min/max itself, letting
// off-screen points still contribute with a weight that decays with distance past
// the edge -- so a peak's influence fades in/out instead of popping. The plugin
// that applies this lives inline in the Chart config (see "smoothYFit").
const MARGIN_FRAC = 0.6;       // off-screen influence band, as a fraction of the visible range
const Y_HEADROOM = 0.05;       // top padding, mirroring Chart.js's auto headroom
const ANCHOR_MIN_ZERO = false; // keep the floating min (set true to floor every axis at 0)

// Smoothstep falloff: 1 at the visible edge (u<=0), 0 beyond the band (u>=1), with a
// continuous slope between. w=1 exactly at the edge so an off-screen point matches its
// own value the moment it scrolls into view -- that equality at the crossing is what
// removes the snap.
function falloff(u) {
  if (u <= 0) return 1;
  if (u >= 1) return 0;
  return 1 - (3 * u * u - 2 * u * u * u);
}

// Pin the smoothYFit x-window to the live x-scale. The scrollbar paths set $xWindow
// explicitly before each instant zoomScale; the zoom plugin's chart-body pan/pinch
// instead move the live x-scale directly, so call this from their onPan/onZoom so the
// y-axes refit to the new region instead of staying pinned to the old window.
function syncXWindow(chart) {
  const x = chart.scales && chart.scales.x;
  if (!x || !isFinite(x.min) || !isFinite(x.max)) return;
  chart.$xWindow = { min: x.min, max: x.max };
}

// Distance-weighted [min,max] for one y-axis over its currently-visible datasets.
// Returns null when the axis has no usable data (caller then leaves Chart's default).
function smoothYExtent(chart, axisId) {
  // Resolve the intended x-window. $xWindow is stashed wherever the window is driven
  // (pan/zoom/reset); fall back to the live x-scale, then to the full data extent so
  // the very first render (before the scrollbar is wired) matches today's full fit.
  let xmin, xmax;
  if (chart.$xWindow) { xmin = chart.$xWindow.min; xmax = chart.$xWindow.max; }
  else if (chart.scales.x && isFinite(chart.scales.x.min)) { xmin = chart.scales.x.min; xmax = chart.scales.x.max; }

  const sets = [];
  chart.data.datasets.forEach((ds, i) => {
    if (ds.yAxisID === axisId && chart.isDatasetVisible(i)) sets.push(ds.data);
  });
  if (sets.length === 0) return null;

  // If we still have no x-window, fit the full extent of the visible data.
  if (xmin == null || !isFinite(xmin) || !isFinite(xmax)) {
    let lo = Infinity, hi = -Infinity;
    for (const data of sets) for (const p of data) {
      if (p.y == null || Number.isNaN(p.y)) continue;
      if (p.y < lo) lo = p.y;
      if (p.y > hi) hi = p.y;
    }
    if (lo > hi) return null;
    return padExtent(lo, hi);
  }

  const R = xmax - xmin;
  const M = MARGIN_FRAC * R;

  // Pass 1: extent of points strictly inside the window.
  let visMin = Infinity, visMax = -Infinity, haveInterior = false;
  // Track the nearest bracketing point on each side for the empty-interior fallback.
  let leftPt = null, leftDist = Infinity, rightPt = null, rightDist = Infinity;
  for (const data of sets) for (const p of data) {
    if (p.y == null || Number.isNaN(p.y)) continue;
    if (p.x >= xmin && p.x <= xmax) {
      haveInterior = true;
      if (p.y < visMin) visMin = p.y;
      if (p.y > visMax) visMax = p.y;
    } else if (p.x < xmin) {
      const d = xmin - p.x;
      if (d < leftDist) { leftDist = d; leftPt = p; }
    } else {
      const d = p.x - xmax;
      if (d < rightDist) { rightDist = d; rightPt = p; }
    }
  }

  if (!haveInterior) {
    // Window sits between samples: seed the extent from the nearest bracketing
    // point(s) at full value so the axis stays meaningful (it can't fade to a
    // collapsed range). It meets the interior case continuously: the instant such
    // a point scrolls in it becomes visMin/visMax directly.
    const seeds = [];
    if (leftPt)  seeds.push(leftPt.y);
    if (rightPt) seeds.push(rightPt.y);
    if (seeds.length === 0) return null;
    visMin = Math.min(...seeds);
    visMax = Math.max(...seeds);
  }

  // Pass 2: let off-screen points pull the envelope outward, fading with distance.
  // Each point's faded candidate is measured from the interior extent (visMin/visMax),
  // and we keep the most extreme candidate -- a nearer, lower peak must not overwrite a
  // farther, taller one, so compare candidates, not raw values.
  let yMin = visMin, yMax = visMax;
  for (const data of sets) for (const p of data) {
    if (p.y == null || Number.isNaN(p.y)) continue;
    if (p.x >= xmin && p.x <= xmax) continue;
    const d = p.x < xmin ? xmin - p.x : p.x - xmax;
    const w = M > 0 ? falloff(d / M) : 0;
    if (w === 0) continue;
    if (p.y > visMax) {
      const cand = visMax + w * (p.y - visMax);
      if (cand > yMax) yMax = cand;
    } else if (p.y < visMin) {
      const cand = visMin + w * (p.y - visMin);
      if (cand < yMin) yMin = cand;
    }
  }

  return padExtent(yMin, yMax);
}

// Add headroom and guarantee min < max for a finite [lo,hi] pair.
function padExtent(lo, hi) {
  let range = hi - lo;
  if (range <= 0) range = Math.max(Math.abs(hi), 1) * 0.1;
  hi += Y_HEADROOM * range;
  if (ANCHOR_MIN_ZERO) lo = Math.min(lo, 0);
  if (hi <= lo) hi = lo + (Math.max(Math.abs(lo), 1) * 0.1);
  return { min: lo, max: hi };
}

// Tick label callback that clamps tick values to whole numbers. With bounds:'data'
// the axis edges (and thus the first/last tick) sit at the exact smooth min/max,
// which are fractional -- so round every tick to an integer and drop a label that
// repeats the previous tick's rounded value (the fractional edge tick can collide
// with its neighbour in tight ranges). `fmt` renders the final integer.
function intTick(fmt) {
  return (v, i, ticks) => {
    const r = Math.round(v);
    if (i > 0 && Math.round(ticks[i - 1].value) === r) return null;
    return fmt(r);
  };
}

function buildChart(snapshots, donations, startTs, hasYTViewers, hasTWViewers, hasChatRate, hasActiveYT, hasActiveTW, hasYTPlat, hasTWPlat) {
  if (currentChart) { currentChart.destroy(); currentChart = null; }

  const ctx = document.getElementById('streamChart');
  if (!ctx) return;

  const snapshotData = snapshots.map(s => ({
    x:        s.ts * 1000,
    yt:       s.youtube || 0,
    tw:       s.twitch  || 0,
    ytMpm:    s.youtube_messages_per_minute ?? null,
    twMpm:    s.twitch_messages_per_minute  ?? null,
    ytActive: s.active_youtube_chatters     ?? null,
    twActive: s.active_twitch_chatters      ?? null,
  }));

  // Bucket donations onto the snapshot index grid so the bar dataset shares the
  // same index space as the line series. This keeps mode:'index' tooltips
  // coherent (every dataset's index i is the same timestamp) and prevents a
  // sparse donation bar from hijacking the nearest-index lookup. Per-donation
  // detail is preserved in the donation log table below.
  const donationByIndex = new Array(snapshotData.length).fill(0);
  if (snapshotData.length > 0) {
    for (const d of donations) {
      const dx = d.ts * 1000;
      let nearest = 0, best = Infinity;
      for (let i = 0; i < snapshotData.length; i++) {
        const dist = Math.abs(snapshotData[i].x - dx);
        if (dist < best) { best = dist; nearest = i; }
        else if (dist > best) break;  // x is sorted ascending; distance is convex
      }
      donationByIndex[nearest] += (d.amount_usd || 0);
    }
  }
  // Running total across the snapshot grid: the donation line is the cumulative
  // money raised up to each point, so it climbs with each donation and plateaus
  // at the stream total. Every index carries a value, making the line solid.
  const donationCumByIndex = new Array(snapshotData.length).fill(0);
  {
    let running = 0;
    for (let i = 0; i < snapshotData.length; i++) {
      running += donationByIndex[i];
      donationCumByIndex[i] = running;
    }
  }
  const hasDonations = donations.length > 0 && snapshotData.length > 0;

  // Time label for the chart x-axis ticks and tooltip, in the active timezone
  // (Ogre/Local/UTC -- see config.js withTZ).
  function fmtET(ms) {
    return new Date(ms).toLocaleTimeString('en-US', withTZ({
      hour: 'numeric', minute: '2-digit',
    }));
  }

  const t = THEMES[localStorage.getItem('swamp-theme') || 'green'] || THEMES.green;
  const datasets = [];

  // ── Viewer series ──
  if (hasYTViewers && snapshotData.length > 0) {
    datasets.push({
      label: DS.YT_VIEWERS,
      hidden: hiddenDatasets.has(DS.YT_VIEWERS),
      data: snapshotData.map(s => ({ x: s.x, y: s.yt })),
      type: 'line',
      borderColor: '#e84040',
      backgroundColor: 'rgba(232,64,64,0.08)',
      borderWidth: 2, pointRadius: 0, pointHoverRadius: 4,
      tension: 0.3, fill: true,
      yAxisID: 'yViewers',
    });
  }

  if (hasTWViewers && snapshotData.length > 0) {
    datasets.push({
      label: DS.TW_VIEWERS,
      hidden: hiddenDatasets.has(DS.TW_VIEWERS),
      data: snapshotData.map(s => ({ x: s.x, y: s.tw })),
      type: 'line',
      borderColor: '#6650d8',
      backgroundColor: 'rgba(102,80,216,0.08)',
      borderWidth: 2, pointRadius: 0, pointHoverRadius: 4,
      tension: 0.3, fill: true,
      yAxisID: 'yViewers',
    });
  }

  if (hasYTViewers && hasTWViewers && snapshotData.length > 0) {
    datasets.push({
      label: DS.TOTAL_VIEWERS,
      hidden: hiddenDatasets.has(DS.TOTAL_VIEWERS),
      data: snapshotData.map(s => ({ x: s.x, y: s.yt + s.tw })),
      type: 'line',
      borderColor: '#40c4ff',
      backgroundColor: 'transparent',
      borderWidth: 2, pointRadius: 0, pointHoverRadius: 4,
      tension: 0.3, fill: false,
      yAxisID: 'yViewers',
    });
  }

  // ── Active chatter series ──
  // Built from the full snapshotData (null where missing) so indices stay
  // aligned with the viewer series; spanGaps bridges the nulls visually.
  if (hasActiveYT) {
    datasets.push({
      label: DS.YT_ACTIVE_CHATTERS,
      hidden: hiddenDatasets.has(DS.YT_ACTIVE_CHATTERS),
      data: snapshotData.map(s => ({ x: s.x, y: s.ytActive })),
      type: 'line',
      borderColor: '#e84040',
      backgroundColor: 'transparent',
      borderWidth: 1.5, borderDash: [2, 2],
      pointRadius: 0, pointHoverRadius: 4,
      tension: 0.3, fill: false, spanGaps: true,
      yAxisID: 'yActiveChatters',
    });
  }

  if (hasActiveTW) {
    datasets.push({
      label: DS.TW_ACTIVE_CHATTERS,
      hidden: hiddenDatasets.has(DS.TW_ACTIVE_CHATTERS),
      data: snapshotData.map(s => ({ x: s.x, y: s.twActive })),
      type: 'line',
      borderColor: '#6650d8',
      backgroundColor: 'transparent',
      borderWidth: 1.5, borderDash: [2, 2],
      pointRadius: 0, pointHoverRadius: 4,
      tension: 0.3, fill: false, spanGaps: true,
      yAxisID: 'yActiveChatters',
    });
  }

  // Combined active chatters -- YT + TW. Only shown when both platforms are
  // live, since for a single-platform stream the total duplicates that line.
  // Null only when BOTH platforms are missing a sample; otherwise a missing
  // side counts as 0.
  if (hasActiveYT && hasActiveTW) {
    datasets.push({
      label: DS.TOTAL_ACTIVE_CHATTERS,
      hidden: hiddenDatasets.has(DS.TOTAL_ACTIVE_CHATTERS),
      data: snapshotData.map(s => ({
        x: s.x,
        y: (s.ytActive == null && s.twActive == null) ? null : (s.ytActive ?? 0) + (s.twActive ?? 0),
      })),
      type: 'line',
      borderColor: '#909090',
      backgroundColor: 'transparent',
      borderWidth: 2, borderDash: [2, 2],
      pointRadius: 0, pointHoverRadius: 4,
      tension: 0.3, fill: false, spanGaps: true,
      yAxisID: 'yActiveChatters',
    });
  }

  // ── Donations (cumulative) ──
  if (hasDonations) {
    datasets.push({
      label: DS.DONATIONS,
      hidden: hiddenDatasets.has(DS.DONATIONS),
      data: snapshotData.map((s, i) => ({
        x: s.x,
        y: donationCumByIndex[i],
      })),
      type: 'line',
      borderColor: '#e8c020',
      backgroundColor: 'rgba(232,192,32,0.12)',
      borderWidth: 2,
      pointRadius: 0, pointHoverRadius: 4,
      tension: 0,
      fill: true,
      yAxisID: 'yDonations',
    });
  }

  // ── Chat rate series ──
  // Built from the full snapshotData so indices align with the viewer series
  // (mode:'index' tooltips match by index, not by x). Missing samples map to
  // null and are bridged with spanGaps; the tooltip filter drops null entries.
  if (hasChatRate && snapshotData.length > 0) {
    if (hasYTPlat) {
      datasets.push({
        label: DS.YT_CHAT,
        hidden: hiddenDatasets.has(DS.YT_CHAT),
        data: snapshotData.map(s => ({ x: s.x, y: s.ytMpm })),
        type: 'line',
        borderColor: '#e84040',
        backgroundColor: 'transparent',
        borderWidth: 1.5, borderDash: [8, 3],
        pointRadius: 0, pointHoverRadius: 4,
        tension: 0.3, fill: false, spanGaps: true,
        yAxisID: 'yChatRate',
      });
    }

    if (hasTWPlat) {
      datasets.push({
        label: DS.TW_CHAT,
        hidden: hiddenDatasets.has(DS.TW_CHAT),
        data: snapshotData.map(s => ({ x: s.x, y: s.twMpm })),
        type: 'line',
        borderColor: '#6650d8',
        backgroundColor: 'transparent',
        borderWidth: 1.5, borderDash: [8, 3],
        pointRadius: 0, pointHoverRadius: 4,
        tension: 0.3, fill: false, spanGaps: true,
        yAxisID: 'yChatRate',
      });
    }

    // Combined -- computed on the fly. Null only when BOTH platforms are
    // missing a sample; otherwise treat a missing side as 0.
    datasets.push({
      label: DS.TOTAL_CHAT,
      hidden: hiddenDatasets.has(DS.TOTAL_CHAT),
      data: snapshotData.map(s => ({
        x: s.x,
        y: (s.ytMpm == null && s.twMpm == null) ? null : (s.ytMpm ?? 0) + (s.twMpm ?? 0),
      })),
      type: 'line',
      borderColor: '#4caf50',
      backgroundColor: 'transparent',
      borderWidth: 2, borderDash: [12, 3],
      pointRadius: 0, pointHoverRadius: 4,
      tension: 0.3, fill: false, spanGaps: true,
      yAxisID: 'yChatRate',
    });
  }

  // For a series with gaps (null y at some indices), return the value at idx,
  // or the nearest non-null value by index distance. Lets the tooltip show every
  // stat at the hovered position even where that stat has no exact sample.
  function nearestValue(dataArr, idx) {
    const at = dataArr[idx];
    if (at && at.y != null && !Number.isNaN(at.y)) return at.y;
    for (let d = 1; d < dataArr.length; d++) {
      const lo = dataArr[idx - d];
      if (lo && lo.y != null && !Number.isNaN(lo.y)) return lo.y;
      const hi = dataArr[idx + d];
      if (hi && hi.y != null && !Number.isNaN(hi.y)) return hi.y;
    }
    return null;
  }

  // Is at least one dataset for this axis group present in this stream AND not hidden by the user?
  function axisHasVisibleDs(labels) {
    return labels.some(l => datasets.some(d => d.label === l) && !hiddenDatasets.has(l));
  }

  currentChart = new Chart(ctx, {
    type: 'bar',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      animation: { duration: 400 },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: t.tooltipBg,
          borderColor: t.tooltipBorder,
          borderWidth: 1,
          titleColor: t.tooltipTitle,
          bodyColor: t.tooltipBody,
          titleFont: { family: "'Share Tech Mono', monospace", size: 11 },
          bodyFont:  { family: "'Lora', serif", size: 13 },
          // Draw each row's key as a line matching the dataset's color AND dash
          // pattern (see lineKeyCanvas) so the tooltip key mirrors the chart line.
          usePointStyle: true,
          boxWidth: 26,
          boxHeight: 10,
          boxPadding: 6,
          // Order tooltip rows to match the legend on top of the chart.
          itemSort: (a, b) => LEGEND_ORDER.indexOf(a.dataset.label) - LEGEND_ORDER.indexOf(b.dataset.label),
          // Donations only show when that bucket actually has a donation.
          // Continuous series always show -- the label callback fills gaps with
          // the nearest sample, so every stat appears whenever the tooltip is up.
          filter: item => {
            if (item.dataset.yAxisID === 'yDonations') {
              return item.parsed.y != null && !Number.isNaN(item.parsed.y);
            }
            return true;
          },
          callbacks: {
            title: items => fmtET(items[0].parsed.x),
            // Key = a short line in the dataset's color + dash pattern.
            labelPointStyle: item => ({
              pointStyle: lineKeyCanvas(item.dataset.borderColor, item.dataset.borderDash),
              rotation: 0,
            }),
            label: item => {
              const isDon = item.dataset.yAxisID === 'yDonations';
              let y = item.parsed.y;
              if (!isDon && (y == null || Number.isNaN(y))) {
                y = nearestValue(item.dataset.data, item.dataIndex);
              }
              if (y == null || Number.isNaN(y)) return null;
              switch (item.dataset.label) {
                case DS.DONATIONS:          return ` $${y.toFixed(2)} raised so far`;
                case DS.YT_CHAT:            return ` YT chat: ${y.toFixed(1)} mpm`;
                case DS.TW_CHAT:            return ` TW chat: ${y.toFixed(1)} mpm`;
                case DS.TOTAL_CHAT:         return ` Total chat: ${y.toFixed(1)} mpm`;
                case DS.YT_ACTIVE_CHATTERS: return ` YT active chatters: ${Math.round(y).toLocaleString()}`;
                case DS.TW_ACTIVE_CHATTERS: return ` TW active chatters: ${Math.round(y).toLocaleString()}`;
                case DS.TOTAL_ACTIVE_CHATTERS: return ` Total active chatters: ${Math.round(y).toLocaleString()}`;
                default:                    return ` ${item.dataset.label}: ${Math.round(y).toLocaleString()} viewers`;
              }
            }
          }
        },
        // X-axis zoom/pan. Wheel + pinch zoom and drag-to-pan, clamped to the
        // stream's own time range. Double-click the chart to reset (see below).
        zoom: {
          pan: {
            enabled: true, mode: 'x',
            // Sync $xWindow to the live x-scale so smoothYFit refits the y-axes to the
            // panned region (the scrollbar drag does the same at line ~1560). Without
            // this the y-scale stays pinned to the pre-drag window.
            onPan: ({ chart }) => { syncXWindow(chart); chart.$updateScrollbar && chart.$updateScrollbar(); },
          },
          zoom: {
            // Wheel zoom is handled manually in setupScrollbar so it can be eased
            // and less sensitive; pinch stays on the plugin for touch devices.
            wheel: { enabled: false },
            pinch: { enabled: true },
            mode: 'x',
            onZoom: ({ chart }) => { syncXWindow(chart); chart.$updateScrollbar && chart.$updateScrollbar(); },
          },
          limits: { x: { min: 'original', max: 'original' } },
        },
      },
      scales: {
        x: {
          type: 'linear',
          offset: false, // override the bar-chart default so lines span edge-to-edge (no slot padding that grows when zoomed)
          grid: { color: t.chartGrid },
          ticks: {
            color: t.chartTick,
            font: { family: "'Share Tech Mono', monospace", size: 15 },
            callback: v => fmtET(v),
            maxTicksLimit: 10,
          }
        },
        yViewers: {
          type: 'linear',
          position: 'left',
          display: axisHasVisibleDs([DS.YT_VIEWERS, DS.TW_VIEWERS, DS.TOTAL_VIEWERS]),
          bounds: 'data', // keep smoothYFit's exact min/max; 'ticks' (default) would round them to tick steps and re-snap the scale
          grid: { color: t.chartGrid },
          ticks: {
            color: '#40c4ff',
            font: { family: "'Share Tech Mono', monospace", size: 14 },
            callback: intTick(v => v.toLocaleString()),
            precision: 0,
            maxTicksLimit: 6,
          },
          title: {
            display: true,
            text: 'viewers',
            color: '#40c4ff',
            font: { family: "'Share Tech Mono', monospace", size: 14 },
          },
        },
        yActiveChatters: {
          type: 'linear',
          position: 'left',
          display: axisHasVisibleDs([DS.YT_ACTIVE_CHATTERS, DS.TW_ACTIVE_CHATTERS, DS.TOTAL_ACTIVE_CHATTERS]),
          bounds: 'data',
          grid: { drawOnChartArea: false },
          ticks: {
            color: '#909090',
            font: { family: "'Share Tech Mono', monospace", size: 14 },
            callback: intTick(v => v.toLocaleString()),
            precision: 0,
            maxTicksLimit: 5,
          },
          title: {
            display: true,
            text: 'chatters',
            color: '#909090',
            font: { family: "'Share Tech Mono', monospace", size: 14 },
          },
        },
        yDonations: {
          type: 'linear',
          position: 'right',
          display: axisHasVisibleDs([DS.DONATIONS]),
          bounds: 'data',
          grid: { drawOnChartArea: false },
          ticks: {
            color: '#e8c020',
            font: { family: "'Share Tech Mono', monospace", size: 14 },
            callback: intTick(v => '$' + v.toLocaleString()),
            precision: 0,
            maxTicksLimit: 5,
          },
          title: { display: false },
        },
        yChatRate: {
          type: 'linear',
          position: 'right',
          display: axisHasVisibleDs([DS.YT_CHAT, DS.TW_CHAT, DS.TOTAL_CHAT]),
          bounds: 'data',
          grid: { drawOnChartArea: false },
          ticks: {
            color: '#4caf50',
            font: { family: "'Share Tech Mono', monospace", size: 14 },
            callback: intTick(v => v.toLocaleString()),
            precision: 0,
            maxTicksLimit: 5,
          },
          title: {
            display: true,
            text: 'msg / min',
            color: '#4caf50',
            font: { family: "'Share Tech Mono', monospace", size: 14 },
          },
        },
      }
    },
    plugins: [{
      // Override each y-axis's auto-fit with the distance-weighted envelope so the
      // scale moves continuously during x zoom/pan instead of snapping. Runs on every
      // update (incl. the 'none'-mode zoomScale frames), reads state and writes
      // scale.min/max in place -- no re-entrant update(), so no animation loop.
      id: 'smoothYFit',
      afterDataLimits(chart, args) {
        const scale = args.scale;
        if (!scale || scale.axis !== 'y') return;       // leave the x-axis to the zoom plugin
        if (scale.options.display === false) return;     // skip hidden axes
        const ext = smoothYExtent(chart, scale.id);      // scale.id === 'yViewers', etc.
        if (!ext) return;
        scale.min = ext.min;
        scale.max = ext.max;
      },
    }],
  });

  // Double-click anywhere on the chart to reset an x-axis zoom/pan.
  ctx.ondblclick = () => {
    if (currentChart && currentChart.resetZoom) {
      if (currentChart.$stopZoomAnim) currentChart.$stopZoomAnim();
      currentChart.resetZoom('none');  // instant reset; afterDataLimits fits y to the (stale) window here
      currentChart.$xWindow = { min: currentChart.scales.x.min, max: currentChart.scales.x.max };
      currentChart.update('none');     // re-run smoothYFit against the restored full window so y refits too
      if (currentChart.$updateScrollbar) currentChart.$updateScrollbar();
    }
  };

  setupScrollbar();
}

// ── Scrub-and-zoom scrollbar ───────────────────────────────────────────────────
// A track under the chart whose thumb shows the visible x-window: drag the thumb
// body to scroll/pan, drag a handle to resize (zoom). Stays in sync with wheel
// zoom and chart panning via the zoom plugin's onZoom/onPan callbacks.
function setupScrollbar() {
  const track = document.getElementById('chartScrollbar');
  const thumb = document.getElementById('chartScrollbarThumb');
  if (!track || !thumb || !currentChart) return;

  const fullMin = currentChart.scales.x.min;
  const fullMax = currentChart.scales.x.max;
  const fullRange = (fullMax - fullMin) || 1;
  const minRange = fullRange * 0.02; // smallest window the thumb can shrink to
  currentChart.$xWindow = { min: fullMin, max: fullMax }; // smoothYFit reads this for the y-fit



  function updateScrollbar() {
    const xs = currentChart.scales.x;
    let lo = Math.max(0, Math.min(1, (xs.min - fullMin) / fullRange));
    let hi = Math.max(0, Math.min(1, (xs.max - fullMin) / fullRange));
    thumb.style.left = (lo * 100) + '%';
    thumb.style.width = Math.max(0, (hi - lo) * 100) + '%';
  }

  function clampRange(min, max) {
    if (max - min < minRange) max = min + minRange;
    if (min < fullMin) { max += (fullMin - min); min = fullMin; }
    if (max > fullMax) { min -= (max - fullMax); max = fullMax; }
    return { min: Math.max(fullMin, min), max: Math.min(fullMax, max) };
  }

  // Instant apply -- used for resize (zoom) where immediate feedback feels best.
  function applyRange(min, max) {
    const r = clampRange(min, max);
    currentChart.$xWindow = { min: r.min, max: r.max };
    currentChart.zoomScale('x', r, 'none');
    updateScrollbar();
  }

  // Smoothed apply -- used for scrolling/panning. Drags are damped (less
  // sensitive) and the view eases toward the target instead of snapping.
  const PAN_SENSITIVITY = 0.6; // < 1 => view moves less than the cursor
  const PAN_SMOOTH = 0.3;      // fraction eased toward target per frame
  const ZOOM_STEP = 0.0007;    // wheel-zoom sensitivity (smaller => less sensitive)
  let targetMin = null, targetMax = null, rafId = null;

  function animateToward() {
    if (!currentChart || !currentChart.scales || !currentChart.scales.x) { rafId = null; return; }
    const xs = currentChart.scales.x;
    let min = xs.min + (targetMin - xs.min) * PAN_SMOOTH;
    let max = xs.max + (targetMax - xs.max) * PAN_SMOOTH;
    const eps = fullRange * 0.0004;
    if (Math.abs(targetMin - min) < eps && Math.abs(targetMax - max) < eps) {
      min = targetMin; max = targetMax; rafId = null;
    } else {
      rafId = requestAnimationFrame(animateToward);
    }
    currentChart.$xWindow = { min, max };
    currentChart.zoomScale('x', { min, max }, 'none');
    updateScrollbar();
  }

  function smoothTo(min, max) {
    const r = clampRange(min, max);
    targetMin = r.min; targetMax = r.max;
    if (rafId == null) rafId = requestAnimationFrame(animateToward);
  }

  // Let the zoom plugin's callbacks refresh the thumb during wheel/drag on the chart.
  currentChart.$updateScrollbar = updateScrollbar;
  // Cancel any in-flight easing so a reset isn't fought by a pending animation.
  currentChart.$stopZoomAnim = () => {
    if (rafId != null) { cancelAnimationFrame(rafId); rafId = null; }
    targetMin = targetMax = null;
  };

  function startDrag(e, mode) {
    e.preventDefault();
    e.stopPropagation();
    const trackW = track.clientWidth || 1;
    const startX = e.touches ? e.touches[0].clientX : e.clientX;
    const startMin = currentChart.scales.x.min;
    const startMax = currentChart.scales.x.max;
    function onMove(ev) {
      const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
      const dxVal = ((cx - startX) / trackW) * fullRange;
      if (mode === 'pan')        smoothTo(startMin + dxVal * PAN_SENSITIVITY, startMax + dxVal * PAN_SENSITIVITY);
      else if (mode === 'left')  applyRange(Math.min(startMin + dxVal, startMax - minRange), startMax);
      else if (mode === 'right') applyRange(startMin, Math.max(startMax + dxVal, startMin + minRange));
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onUp);
  }

  thumb.addEventListener('mousedown', e => startDrag(e, 'pan'));
  thumb.addEventListener('touchstart', e => startDrag(e, 'pan'), { passive: false });
  const hLeft = thumb.querySelector('.chart-scrollbar-handle.left');
  const hRight = thumb.querySelector('.chart-scrollbar-handle.right');
  if (hLeft)  { hLeft.addEventListener('mousedown', e => startDrag(e, 'left'));   hLeft.addEventListener('touchstart', e => startDrag(e, 'left'), { passive: false }); }
  if (hRight) { hRight.addEventListener('mousedown', e => startDrag(e, 'right')); hRight.addEventListener('touchstart', e => startDrag(e, 'right'), { passive: false }); }

  // Click empty track to recenter the current window where you clicked.
  track.addEventListener('mousedown', e => {
    if (e.target !== track) return; // ignore clicks that land on the thumb/handles
    const rect = track.getBoundingClientRect();
    const frac = (e.clientX - rect.left) / (rect.width || 1);
    const xs = currentChart.scales.x;
    const half = (xs.max - xs.min) / 2;
    const center = fullMin + frac * fullRange;
    smoothTo(center - half, center + half);
  });

  // Eased, less-sensitive wheel zoom toward the cursor (replaces the plugin's
  // built-in wheel zoom, which is instant and steppy). Normalizes wheel delta
  // across devices, caps each step, then eases toward the target via smoothTo.
  const canvas = currentChart.canvas;
  if (canvas) {
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      let d = e.deltaY;
      if (e.deltaMode === 1) d *= 16;        // line units -> approx pixels
      else if (e.deltaMode === 2) d *= 400;  // page units -> approx pixels
      d = Math.max(-80, Math.min(80, d));    // cap the per-event zoom step
      const factor = Math.exp(d * ZOOM_STEP); // >1 zoom out, <1 zoom in
      // Build on the in-flight target while animating so fast scrolls accumulate.
      const animating = rafId != null && targetMin != null;
      const baseMin = animating ? targetMin : currentChart.scales.x.min;
      const baseMax = animating ? targetMax : currentChart.scales.x.max;
      const area = currentChart.chartArea;
      const rect = canvas.getBoundingClientRect();
      const frac = Math.max(0, Math.min(1, (e.clientX - rect.left - area.left) / ((area.right - area.left) || 1)));
      const cursor = baseMin + frac * (baseMax - baseMin);
      smoothTo(cursor - (cursor - baseMin) * factor, cursor + (baseMax - cursor) * factor);
    }, { passive: false });
  }

  updateScrollbar();
}

// ── Interactive legend ─────────────────────────────────────────────────────────
function buildLegend(hasYTViewers, hasTWViewers, hasChatRate, hasDonations, hasActiveYT, hasActiveTW, hasYTPlat, hasTWPlat) {
  const container = document.getElementById('chartLegend');
  if (!container || !currentChart) return;

  // Each entry: { label, type ('line'|'dashed'|'bar'), color, dsLabel }
  // Grouped by category; dividers are inserted only between non-empty groups
  // so a stream missing a whole category never gets a stray separator.
  // Order: Donations | Total/YT/TW Viewers | Active Chatters | Total/YT/TW Chat
  const groups = [];

  const gDonations = [];
  if (hasDonations) gDonations.push({ label: 'Donations', type: 'line', color: '#e8c020', ds: DS.DONATIONS });
  groups.push(gDonations);

  const gViewers = [];
  if (hasYTViewers && hasTWViewers) gViewers.push({ label: 'Total Viewers', type: 'line', color: '#40c4ff', ds: DS.TOTAL_VIEWERS });
  if (hasYTViewers)          gViewers.push({ label: 'YT Viewers',    type: 'line', color: '#e84040', ds: DS.YT_VIEWERS });
  if (hasTWViewers)          gViewers.push({ label: 'TW Viewers',    type: 'line', color: '#6650d8', ds: DS.TW_VIEWERS });
  groups.push(gViewers);

  const gActive = [];
  if (hasActiveYT && hasActiveTW) gActive.push({ label: 'Total Active Chatters', type: 'dotted', color: '#909090', ds: DS.TOTAL_ACTIVE_CHATTERS });
  if (hasActiveYT) gActive.push({ label: 'YT Active Chatters', type: 'dotted', color: '#e84040', ds: DS.YT_ACTIVE_CHATTERS });
  if (hasActiveTW) gActive.push({ label: 'TW Active Chatters', type: 'dotted', color: '#6650d8', ds: DS.TW_ACTIVE_CHATTERS });
  groups.push(gActive);

  const gChat = [];
  if (hasChatRate) {
    gChat.push({ label: 'Total Msg/Min', type: 'dashed', color: '#4caf50', ds: DS.TOTAL_CHAT });
    if (hasYTPlat) gChat.push({ label: 'YT Msg/Min', type: 'dashed', color: '#e84040', ds: DS.YT_CHAT });
    if (hasTWPlat) gChat.push({ label: 'TW Msg/Min', type: 'dashed', color: '#6650d8', ds: DS.TW_CHAT });
  }
  groups.push(gChat);

  const items = [];
  for (const g of groups.filter(g => g.length > 0)) {
    if (items.length > 0) items.push({ label: null }); // divider between groups
    items.push(...g);
  }

  container.innerHTML = '';

  for (const item of items) {
    if (item.label === null) {
      // Divider
      const div = document.createElement('span');
      div.className = 'legend-divider';
      container.appendChild(div);
      continue;
    }

    const span = document.createElement('span');
    span.className = 'legend-item';
    span.dataset.ds = item.ds;

    let indicator;
    if (item.type === 'bar') {
      indicator = `<span class="legend-swatch" style="background:${item.color};"></span>`;
    } else if (item.type === 'dashed') {
      // Dashed line indicator: two short segments with a gap
      indicator = `<svg width="20" height="8" style="flex-shrink:0;"><line x1="0" y1="4" x2="7" y2="4" stroke="${item.color}" stroke-width="2"/><line x1="11" y1="4" x2="20" y2="4" stroke="${item.color}" stroke-width="2"/></svg>`;
    } else if (item.type === 'dotted') {
      // Dotted line indicator: matches the [2,2] dash on the active-chatter lines
      indicator = `<svg width="20" height="8" style="flex-shrink:0;"><line x1="0" y1="4" x2="20" y2="4" stroke="${item.color}" stroke-width="2" stroke-dasharray="2 2"/></svg>`;
    } else {
      indicator = `<span class="legend-line" style="background:${item.color};"></span>`;
    }

    span.innerHTML = `${indicator}${item.label}`;
    if (hiddenDatasets.has(item.ds)) span.classList.add('hidden');

    span.addEventListener('click', () => {
      const dsIndex = currentChart.data.datasets.findIndex(d => d.label === item.ds);
      if (dsIndex === -1) return;
      const nowVisible = currentChart.isDatasetVisible(dsIndex);
      currentChart.setDatasetVisibility(dsIndex, !nowVisible);
      span.classList.toggle('hidden', nowVisible);
      if (nowVisible) hiddenDatasets.add(item.ds);
      else hiddenDatasets.delete(item.ds);
      localStorage.setItem('stream-chart-hidden', JSON.stringify([...hiddenDatasets]));
      syncAxisDisplay();
    });

    container.appendChild(span);
  }
}

loadStreamList();
</script>
</body>
</html>

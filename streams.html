<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streams</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Lora:ital,wght@0,400;0,500;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link id="theme-css" rel="stylesheet" href="themes/bog-moss.css">
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: transparent;
    color: var(--text-primary);
    font-family: 'Lora', serif;
    font-size: 16px;
    line-height: 1.6;
    overflow: hidden;
  }

  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    height: 100vh;
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--bg-surface);
    border-right: 1px solid var(--border-default);
    overflow-y: auto;
    padding: 12px 0;
    position: relative;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: var(--bg-surface); }
  .sidebar::-webkit-scrollbar-thumb { background: var(--bg-raised); border-radius: 2px; }

  .sidebar-label {
    font-family: 'Rye', serif;
    font-size: 12px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    padding: 4px 16px 8px;
    text-transform: uppercase;
  }

  .stream-item {
    padding: 10px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s ease;
    position: relative;
  }

  .stream-item:hover {
    background: rgba(100,180,60,0.07);
    border-left-color: rgba(100,180,60,0.3);
  }

  .stream-item.active {
    background: rgba(100,180,60,0.12);
    border-left-color: var(--accent);
  }

  .stream-item-date {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: var(--accent);
    display: block;
  }

  .stream-item-time {
    font-size: 13px;
    color: var(--text-muted);
    display: block;
    margin-top: 1px;
  }

  .stream-item-badge {
    display: inline-block;
    font-size: 12px;
    padding: 1px 6px;
    border-radius: 3px;
    margin-top: 4px;
    font-family: 'Share Tech Mono', monospace;
  }

  .badge-yt   { background: rgba(192,57,43,0.25);  color: #e07060; border: 1px solid rgba(192,57,43,0.3); }
  .badge-tw   { background: rgba(123,79,166,0.25); color: #b090d0; border: 1px solid rgba(123,79,166,0.3); }
  .badge-both { background: rgba(90,90,0,0.3);     color: #c8b060; border: 1px solid rgba(150,130,0,0.3); }

  .sidebar-empty {
    padding: 16px;
    font-size: 15px;
    color: var(--text-muted);
    font-style: italic;
  }

  /* ── Content area ── */
  .content-area {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Stream title bar -- sits between tab bar and stats */
  .stream-title-bar {
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border-default);
    padding: 10px 24px;
    flex-shrink: 0;
    min-height: 44px;
    display: flex;
    align-items: center;
  }

  .stream-title-text {
    font-family: 'Rye', serif;
    font-size: 16px;
    color: var(--accent-bright);
    letter-spacing: 0.03em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    opacity: 0.9;
  }

  /* ── Main content ── */
  .main {
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    flex: 1;
  }

  .main::-webkit-scrollbar { width: 4px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--bg-raised); border-radius: 2px; }

  /* ── Stat cards ── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
  }

  .stat-card {
    background: var(--bg-panel);
    border: 1px solid var(--border-default);
    border-radius: 6px;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-bright), transparent);
    opacity: 0.4;
  }

  .stat-label {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace;
    display: block;
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: 'Rye', serif;
    font-size: 24px;
    color: var(--accent-bright);
    display: block;
    line-height: 1.1;
    text-shadow: 0 0 12px rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.3);
  }

  .stat-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 3px;
    display: block;
    font-style: italic;
  }

  /* ── Chart panel ── */
  .chart-panel {
    background: var(--bg-panel);
    border: 1px solid var(--border-default);
    border-radius: 6px;
    padding: 16px 20px;
  }

  .chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .chart-title {
    font-family: 'Rye', serif;
    font-size: 14px;
    color: var(--text-primary);
    letter-spacing: 0.04em;
  }

  .chart-legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    color: var(--text-muted);
    font-family: 'Share Tech Mono', monospace;
  }

  .legend-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .legend-line   { width: 16px; height: 2px;  border-radius: 1px; flex-shrink: 0; }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    color: var(--text-muted);
    font-family: 'Share Tech Mono', monospace;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.15s ease;
  }

  .legend-item:hover { color: var(--accent); }
  .legend-item.hidden { opacity: 0.35; }

  .legend-divider {
    width: 1px;
    height: 14px;
    background: var(--border-default);
    flex-shrink: 0;
    margin: 0 2px;
  }

  .chart-wrap { position: relative; width: 100%; height: 300px; }

  /* ── Donation table ── */
  .donations-panel {
    background: var(--bg-panel);
    border: 1px solid var(--border-default);
    border-radius: 6px;
    padding: 16px 20px;
  }

  .donations-title {
    font-family: 'Rye', serif;
    font-size: 14px;
    color: var(--text-primary);
    margin-bottom: 12px;
    letter-spacing: 0.04em;
  }

  .donations-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 15px;
  }

  .donations-table th {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: left;
    padding: 4px 8px 8px;
    border-bottom: 1px solid var(--border-default);
  }

  .donations-table td {
    padding: 8px 8px;
    border-bottom: 1px solid rgba(100,180,60,0.07);
    vertical-align: top;
  }

  .donations-table tr:last-child td { border-bottom: none; }

  .donations-table tr:hover td {
    background: rgba(100,180,60,0.05);
  }

  .type-badge {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 2px 7px;
    border-radius: 3px;
    border: 1px solid;
  }

  .type-superchat  { color: #80c8a0; border-color: rgba(80,180,120,0.35);  background: rgba(40,120,70,0.2); }
  .type-membership { color: #80c8a0; border-color: rgba(80,180,120,0.25);  background: rgba(30,100,60,0.15); }
  .type-bits       { color: #b090d0; border-color: rgba(130,80,180,0.35);  background: rgba(90,50,140,0.2); }
  .type-giftsub    { color: #b090d0; border-color: rgba(130,80,180,0.25);  background: rgba(70,40,110,0.15); }
  .type-sub        { color: #b090d0; border-color: rgba(130,80,180,0.25);  background: rgba(70,40,110,0.15); }

  .amount-usd { font-family: 'Share Tech Mono', monospace; color: var(--accent); font-size: 14px; }
  .username   { color: var(--text-primary); }
  .ts-cell    { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--text-muted); white-space: nowrap; }
  .msg-cell   { font-family: 'Lora', serif; color: var(--text-muted); font-size: 14px; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── States ── */
  .loading-state, .empty-state, .error-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text-muted);
    font-style: italic;
    font-size: 16px;
  }

  .loading-glyph {
    font-family: 'Rye', serif;
    font-size: 32px;
    color: var(--accent);
    animation: flicker 2s ease-in-out infinite;
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; text-shadow: 0 0 20px rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.6); }
    50%       { opacity: 0.7; text-shadow: 0 0 8px rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.2); }
  }

</style>
</head>
<body>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="loading-state" style="height:200px;">
      <span class="loading-glyph">~</span>
      <span>wading in...</span>
    </div>
  </nav>

  <div class="content-area">
    <div class="stream-title-bar">
      <span class="stream-title-text" id="streamTitle"></span>
    </div>
    <main class="main" id="main">
      <div class="empty-state">
        <span class="loading-glyph" style="font-size:40px;">☽</span>
        <span>select a stream from the list</span>
      </div>
    </main>
  </div>
</div>

<script src="config.js"></script>
<script>
const RAW = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${BRANCH}`;

let currentChart = null;

// ── Theme ─────────────────────────────────────────────────────────────────────
const THEMES = {
  green: { file: 'themes/bog-moss.css',      chartGrid: 'rgba(100,180,60,0.08)',   chartTick: '#4a7038', donBar: 'rgba(100,180,60,0.75)',   donBorder: '#96d45a', tooltipBg: '#0e160e', tooltipTitle: '#7ab84a', tooltipBody: '#b8c9a0', donTick: '#4a7038',  tooltipBorder: 'rgba(100,180,60,0.4)' },
  amber: { file: 'themes/firepit.css',        chartGrid: 'rgba(196,125,42,0.08)',   chartTick: '#7a6045', donBar: 'rgba(196,125,42,0.75)',   donBorder: '#e8952a', tooltipBg: '#1c150a', tooltipTitle: '#c47d2a', tooltipBody: '#c8a97a', donTick: '#8a6030',  tooltipBorder: 'rgba(196,125,42,0.4)' },
  grey:  { file: 'themes/dead-stone.css',     chartGrid: 'rgba(160,160,148,0.08)',  chartTick: '#606058', donBar: 'rgba(140,140,130,0.75)',  donBorder: '#b0b0a8', tooltipBg: '#141414', tooltipTitle: '#909088', tooltipBody: '#c0c0b8', donTick: '#606058',  tooltipBorder: 'rgba(160,160,148,0.4)' },
  void:  { file: 'themes/the-void.css',       chartGrid: 'rgba(255,255,255,0.08)',  chartTick: '#a0a0a0', donBar: 'rgba(200,200,200,0.75)',  donBorder: '#ffffff', tooltipBg: '#0a0a0a', tooltipTitle: '#ffffff', tooltipBody: '#f0f0f0', donTick: '#a0a0a0',  tooltipBorder: 'rgba(255,255,255,0.45)' },
  white: { file: 'themes/onion-layers.css',   chartGrid: 'rgba(160,160,148,0.08)',  chartTick: '#606058', donBar: 'rgba(140,140,130,0.75)',  donBorder: '#b0b0a8', tooltipBg: '#141414', tooltipTitle: '#909088', tooltipBody: '#c0c0b8', donTick: '#606058',  tooltipBorder: 'rgba(160,160,148,0.4)' },
};

function applyTheme(key) {
  const t = THEMES[key] || THEMES.green;
  document.getElementById('theme-css').href = t.file;
  if (currentChart) {
    const ds = currentChart.data.datasets;
    const donDs = ds.find(d => d.label === DS.DONATIONS);
    if (donDs) { donDs.backgroundColor = t.donBar; donDs.borderColor = t.donBorder; }
    currentChart.options.scales.yViewers.grid.color = t.chartGrid;
    currentChart.options.scales.yViewers.ticks.color = t.chartTick;
    currentChart.options.scales.x.grid.color = t.chartGrid;
    currentChart.options.scales.x.ticks.color = t.chartTick;
    currentChart.options.scales.yDonations.ticks.color = t.donTick;
    currentChart.options.plugins.tooltip.backgroundColor = t.tooltipBg;
    currentChart.options.plugins.tooltip.titleColor = t.tooltipTitle;
    currentChart.options.plugins.tooltip.bodyColor = t.tooltipBody;
    currentChart.options.plugins.tooltip.borderColor = t.tooltipBorder;
    currentChart.update('none');
  }
}

// Apply theme from localStorage on load, then listen for live updates from parent
applyTheme(localStorage.getItem('swamp-theme') || 'green');
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'theme') applyTheme(e.data.key);
});

// Forward mouse position to parent for roach/eye animations
document.addEventListener('mousemove', e => {
  try { window.parent.postMessage({ type: 'mousemove', x: e.clientX, y: e.clientY }, '*'); } catch(err) {}
});
document.addEventListener('mouseleave', () => {
  try { window.parent.postMessage({ type: 'mouseleave' }, '*'); } catch(err) {}
});

// ── Utilities ──────────────────────────────────────────────────────────────────
async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText} — ${url}`);
  return r.json();
}

async function fetchText(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${r.status} — ${url}`);
  return r.text();
}

function parseJSONL(text) {
  return text.trim().split('\n').filter(Boolean).map(l => {
    try { return JSON.parse(l); } catch { return null; }
  }).filter(Boolean);
}

function fmtDate(ts) {
  return new Date(ts * 1000).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function fmtTime(ts) {
  return new Date(ts * 1000).toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
}

function fmtDuration(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function fmtElapsed(startTs, ts) {
  const s = ts - startTs;
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  return h > 0 ? `${h}:${String(m).padStart(2,'0')}:00` : `${m}:00`;
}

function platformBadge(platforms) {
  if (!platforms || platforms.length === 0) return '';
  const hasYT = platforms.includes('youtube');
  const hasTW = platforms.includes('twitch');
  if (hasYT && hasTW) return '<span class="stream-item-badge badge-both">YT + TW</span>';
  if (hasYT) return '<span class="stream-item-badge badge-yt">YouTube</span>';
  if (hasTW) return '<span class="stream-item-badge badge-tw">Twitch</span>';
  return '';
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Stream list ────────────────────────────────────────────────────────────────
async function loadStreamList() {
  const sidebar = document.getElementById('sidebar');
  try {
    const streamIds = await fetchJSON(`${RAW}/data/streams/index.json`);

    if (streamIds.length === 0) {
      sidebar.innerHTML = '<div class="sidebar-empty">no streams yet — check back after the next broadcast</div>';
      return;
    }

    // Fetch all metadata in parallel, then sort newest-first by start_ts.
    const metaResults = await Promise.allSettled(
      streamIds.map(id => fetchJSON(`${RAW}/data/streams/${id}/metadata.json`))
    );

    const streams = streamIds
      .map((id, i) => ({
        id,
        meta: metaResults[i].status === 'fulfilled' ? metaResults[i].value : null,
      }))
      .sort((a, b) => {
        const ta = a.meta?.start_ts ?? 0;
        const tb = b.meta?.start_ts ?? 0;
        return tb - ta;  // newest first
      });

    sidebar.innerHTML = '<div class="sidebar-label">Streams</div>';

    const ordinal = n => {
      const s = ['th','st','nd','rd'], v = n % 100;
      return n + (s[(v-20)%10] || s[v] || s[0]);
    };

    for (const [idx, { id, meta }] of streams.entries()) {
      const div = document.createElement('div');
      div.className = 'stream-item' + (idx === 0 ? ' active' : '');
      div.dataset.id = id;

      let datePart = '—';
      let timePart = '';

      if (meta?.start_ts) {
        const utcDate = new Date(meta.start_ts * 1000);
        datePart = utcDate.toLocaleDateString('en-US', {
          timeZone: 'America/New_York',
          month: 'long', day: 'numeric', year: 'numeric'
        }).replace(/(\d+),/, (_, d) => ordinal(+d) + ',');
        timePart = utcDate.toLocaleTimeString('en-US', {
          timeZone: 'America/New_York',
          hour: 'numeric', minute: '2-digit', timeZoneName: 'short'
        });
      }

      div.innerHTML = `
        <span class="stream-item-date">${datePart}</span>
        <span class="stream-item-time">${timePart}</span>
        ${meta ? platformBadge(meta.platforms) : ''}
        ${meta?.end_ts && meta?.start_ts ? `<span class="stream-item-time">${fmtDuration(meta.end_ts - meta.start_ts)}</span>` : ''}
      `;

      div.addEventListener('click', () => {
        document.querySelectorAll('.stream-item').forEach(el => el.classList.remove('active'));
        div.classList.add('active');
        loadStream(id);
      });

      sidebar.appendChild(div);
    }

    if (streams.length > 0) loadStream(streams[0].id);

  } catch (e) {
    sidebar.innerHTML = `<div class="sidebar-empty">couldn't reach the swamp<br><small>${e.message}</small></div>`;
  }
}

// ── Stream detail ──────────────────────────────────────────────────────────────
async function loadStream(streamId) {
  const main = document.getElementById('main');
  main.innerHTML = `<div class="loading-state"><span class="loading-glyph">~</span><span>wading in...</span></div>`;
  document.getElementById('streamTitle').textContent = '';

  try {
    const [meta, eventsText] = await Promise.all([
      fetchJSON(`${RAW}/data/streams/${streamId}/metadata.json`),
      fetchText(`${RAW}/data/streams/${streamId}/events.jsonl`),
    ]);

    if (meta.title) {
      document.getElementById('streamTitle').textContent = meta.title;
    }

    const events    = parseJSONL(eventsText);
    const snapshots = events.filter(e => e.event === 'viewer_snapshot');
    const donations = events.filter(e => e.event === 'donation');

    const startTs   = meta.start_ts;
    const endTs     = meta.end_ts;
    const duration  = (endTs && startTs) ? endTs - startTs : null;
    const peakYT    = snapshots.reduce((m, s) => Math.max(m, s.youtube || 0), 0);
    const peakTW    = snapshots.reduce((m, s) => Math.max(m, s.twitch  || 0), 0);
    const peakTotal = snapshots.reduce((m, s) => Math.max(m, s.total   || 0), 0);
    const totalUSD  = donations.reduce((s, d) => s + (d.amount_usd || 0), 0);
    const donCount  = donations.length;

    const platforms = meta.platforms || [];
    const hasYT = platforms.includes('youtube');
    const hasTW = platforms.includes('twitch');

    main.innerHTML = '';

    // ── Stat cards ──
    const grid = document.createElement('div');
    grid.className = 'stat-grid';

    function card(label, value, sub) {
      return `<div class="stat-card">
        <span class="stat-label">${label}</span>
        <span class="stat-value">${value}</span>
        ${sub ? `<span class="stat-sub">${sub}</span>` : ''}
      </div>`;
    }

    let cards = '';
    cards += card('Duration',     duration ? fmtDuration(duration) : '—',  fmtDate(startTs));
    cards += card('Peak Viewers', peakTotal.toLocaleString(), hasYT && hasTW ? `YT ${peakYT} · TW ${peakTW}` : '');
    cards += card('Total Raised', '$' + totalUSD.toFixed(2), `${donCount} donation${donCount !== 1 ? 's' : ''}`);

    const avgYT = snapshots.length ? Math.round(snapshots.reduce((s,x) => s + (x.youtube||0), 0) / snapshots.length) : 0;
    const avgTW = snapshots.length ? Math.round(snapshots.reduce((s,x) => s + (x.twitch ||0), 0) / snapshots.length) : 0;
    cards += card('Avg Viewers', (avgYT + avgTW).toLocaleString(), hasYT && hasTW ? `YT ${avgYT} · TW ${avgTW}` : '');

    const peakActiveYT = snapshots.reduce((m, s) => Math.max(m, s.active_youtube_chatters || 0), 0);
    const peakActiveTW = snapshots.reduce((m, s) => Math.max(m, s.active_twitch_chatters  || 0), 0);
    const hasActiveYTData = snapshots.some(s => s.active_youtube_chatters != null);
    const hasActiveTWData = snapshots.some(s => s.active_twitch_chatters  != null);

    if (hasActiveYTData || hasActiveTWData) {
      const bothActive = hasActiveYTData && hasActiveTWData;
      const activeValue = bothActive
        ? (peakActiveYT + peakActiveTW).toLocaleString()
        : hasActiveYTData ? peakActiveYT.toLocaleString() : peakActiveTW.toLocaleString();
      const activeSub = bothActive ? `YT ${peakActiveYT} · TW ${peakActiveTW}` : '';
      cards += card('Peak Active Chatters', activeValue, activeSub);
    }

    grid.innerHTML = cards;
    main.appendChild(grid);

    // ── Combined chart ──
    if (snapshots.length > 0 || donations.length > 0) {
      const panel = document.createElement('div');
      panel.className = 'chart-panel';

      const hasChatRate = snapshots.some(s =>
        s.youtube_messages_per_minute != null || s.twitch_messages_per_minute != null
      );
      const hasActiveYT = hasYT && snapshots.some(s => s.active_youtube_chatters != null);
      const hasActiveTW = hasTW && snapshots.some(s => s.active_twitch_chatters != null);

      panel.innerHTML = `
        <div class="chart-header">
          <span class="chart-title">Viewers &amp; Donations</span>
          <div class="chart-legend" id="chartLegend"></div>
        </div>
        <div class="chart-wrap">
          <canvas id="streamChart" role="img" aria-label="Viewer counts, donations and chat rate over stream duration"></canvas>
        </div>`;
      main.appendChild(panel);

      buildChart(snapshots, donations, startTs, hasYT, hasTW, hasChatRate, hasActiveYT, hasActiveTW);
      buildLegend(hasYT, hasTW, hasChatRate, donations.length > 0, hasActiveYT, hasActiveTW);
    }

    // ── Donation log ──
    if (donations.length > 0) {
      const panel = document.createElement('div');
      panel.className = 'donations-panel';

      const sorted = [...donations].sort((a,b) => a.ts - b.ts);
      const rows = sorted.map(d => {
        const elapsed = startTs ? fmtElapsed(startTs, d.ts) : fmtTime(d.ts);
        const usd     = d.amount_usd != null ? `<span class="amount-usd">$${d.amount_usd.toFixed(2)}</span>` : '<span class="amount-usd">—</span>';
        const msg     = d.message ? `<span class="msg-cell" title="${d.message.replace(/"/g,'&quot;')}">${escHtml(d.message)}</span>` : '';
        return `<tr>
          <td class="ts-cell">${elapsed}</td>
          <td><span class="username">${escHtml((d.username || '').replace(/^@+/, ''))}</span></td>
          <td><span class="type-badge type-${d.type}">${d.type}</span></td>
          <td>${usd}</td>
          <td>${msg}</td>
        </tr>`;
      }).join('');

      panel.innerHTML = `
        <div class="donations-title">Donation Log</div>
        <table class="donations-table">
          <thead><tr>
            <th>Time</th><th>User</th><th>Type</th><th>Amount</th><th>Message</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
      main.appendChild(panel);
    }

  } catch (e) {
    main.innerHTML = `<div class="error-state"><span class="loading-glyph">✕</span><span>failed to load stream<br><small>${e.message}</small></span></div>`;
  }
}

// ── Chart ──────────────────────────────────────────────────────────────────────

// Dataset label constants -- used to match datasets in legend toggle and theme update
const DS = {
  YT_VIEWERS:       'YouTube Viewers',
  TW_VIEWERS:       'Twitch Viewers',
  DONATIONS:        'Donations',
  YT_CHAT:          'YouTube Chat',
  TW_CHAT:          'Twitch Chat',
  TOTAL_CHAT:       'Total Chat',
  YT_ACTIVE_CHATTERS: 'YT Active Chatters',
  TW_ACTIVE_CHATTERS: 'TW Active Chatters',
};

function buildChart(snapshots, donations, startTs, hasYT, hasTW, hasChatRate, hasActiveYT, hasActiveTW) {
  if (currentChart) { currentChart.destroy(); currentChart = null; }

  const ctx = document.getElementById('streamChart');
  if (!ctx) return;

  const snapshotData = snapshots.map(s => ({
    x:        s.ts * 1000,
    yt:       s.youtube || 0,
    tw:       s.twitch  || 0,
    ytMpm:    s.youtube_messages_per_minute ?? null,
    twMpm:    s.twitch_messages_per_minute  ?? null,
    ytActive: s.active_youtube_chatters     ?? null,
    twActive: s.active_twitch_chatters      ?? null,
  }));

  const donationData = donations.map(d => ({ x: d.ts * 1000, y: d.amount_usd || 0 }));

  function fmtET(ms) {
    return new Date(ms).toLocaleTimeString('en-US', {
      timeZone: 'America/New_York', hour: 'numeric', minute: '2-digit',
    });
  }

  const t = THEMES[localStorage.getItem('swamp-theme') || 'green'] || THEMES.green;
  const datasets = [];

  // ── Viewer series ──
  if (hasYT && snapshotData.length > 0) {
    datasets.push({
      label: DS.YT_VIEWERS,
      data: snapshotData.map(s => ({ x: s.x, y: s.yt })),
      type: 'line',
      borderColor: '#c0392b',
      backgroundColor: 'rgba(192,57,43,0.08)',
      borderWidth: 2, pointRadius: 0, pointHoverRadius: 4,
      tension: 0.3, fill: true,
      yAxisID: 'yViewers',
    });
  }

  if (hasTW && snapshotData.length > 0) {
    datasets.push({
      label: DS.TW_VIEWERS,
      data: snapshotData.map(s => ({ x: s.x, y: s.tw })),
      type: 'line',
      borderColor: '#7b4fa6',
      backgroundColor: 'rgba(123,79,166,0.08)',
      borderWidth: 2, pointRadius: 0, pointHoverRadius: 4,
      tension: 0.3, fill: true,
      yAxisID: 'yViewers',
    });
  }

  // ── Active chatter series ──
  // Built from the full snapshotData (null where missing) so indices stay
  // aligned with the viewer series; spanGaps bridges the nulls visually.
  if (hasActiveYT) {
    datasets.push({
      label: DS.YT_ACTIVE_CHATTERS,
      data: snapshotData.map(s => ({ x: s.x, y: s.ytActive })),
      type: 'line',
      borderColor: '#e8952a',
      backgroundColor: 'transparent',
      borderWidth: 1.5, borderDash: [2, 2],
      pointRadius: 0, pointHoverRadius: 4,
      tension: 0.3, fill: false, spanGaps: true,
      yAxisID: 'yViewers',
    });
  }

  if (hasActiveTW) {
    datasets.push({
      label: DS.TW_ACTIVE_CHATTERS,
      data: snapshotData.map(s => ({ x: s.x, y: s.twActive })),
      type: 'line',
      borderColor: '#b07de0',
      backgroundColor: 'transparent',
      borderWidth: 1.5, borderDash: [2, 2],
      pointRadius: 0, pointHoverRadius: 4,
      tension: 0.3, fill: false, spanGaps: true,
      yAxisID: 'yViewers',
    });
  }

  // ── Donations ──
  if (donationData.length > 0) {
    datasets.push({
      label: DS.DONATIONS,
      data: donationData.map(d => ({ x: d.x, y: d.y })),
      type: 'bar',
      backgroundColor: t.donBar,
      borderColor: t.donBorder,
      borderWidth: 1, borderRadius: 2, barThickness: 8,
      yAxisID: 'yDonations',
    });
  }

  // ── Chat rate series ──
  // Built from the full snapshotData so indices align with the viewer series
  // (mode:'index' tooltips match by index, not by x). Missing samples map to
  // null and are bridged with spanGaps; the tooltip filter drops null entries.
  if (hasChatRate && snapshotData.length > 0) {
    if (hasYT) {
      datasets.push({
        label: DS.YT_CHAT,
        data: snapshotData.map(s => ({ x: s.x, y: s.ytMpm })),
        type: 'line',
        borderColor: '#e05545',
        backgroundColor: 'transparent',
        borderWidth: 1.5, borderDash: [4, 3],
        pointRadius: 0, pointHoverRadius: 4,
        tension: 0.3, fill: false, spanGaps: true,
        yAxisID: 'yChatRate',
      });
    }

    if (hasTW) {
      datasets.push({
        label: DS.TW_CHAT,
        data: snapshotData.map(s => ({ x: s.x, y: s.twMpm })),
        type: 'line',
        borderColor: '#9b70d0',
        backgroundColor: 'transparent',
        borderWidth: 1.5, borderDash: [4, 3],
        pointRadius: 0, pointHoverRadius: 4,
        tension: 0.3, fill: false, spanGaps: true,
        yAxisID: 'yChatRate',
      });
    }

    // Combined -- computed on the fly. Null only when BOTH platforms are
    // missing a sample; otherwise treat a missing side as 0.
    datasets.push({
      label: DS.TOTAL_CHAT,
      data: snapshotData.map(s => ({
        x: s.x,
        y: (s.ytMpm == null && s.twMpm == null) ? null : (s.ytMpm ?? 0) + (s.twMpm ?? 0),
      })),
      type: 'line',
      borderColor: '#a0a090',
      backgroundColor: 'transparent',
      borderWidth: 2, borderDash: [6, 3],
      pointRadius: 0, pointHoverRadius: 4,
      tension: 0.3, fill: false, spanGaps: true,
      yAxisID: 'yChatRate',
    });
  }

  currentChart = new Chart(ctx, {
    type: 'bar',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      animation: { duration: 400 },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: t.tooltipBg,
          borderColor: t.tooltipBorder,
          borderWidth: 1,
          titleColor: t.tooltipTitle,
          bodyColor: t.tooltipBody,
          titleFont: { family: "'Share Tech Mono', monospace", size: 11 },
          bodyFont:  { family: "'Lora', serif", size: 13 },
          filter: item => item.parsed.y !== null && item.parsed.y !== undefined && !Number.isNaN(item.parsed.y),
          callbacks: {
            title: items => fmtET(items[0].parsed.x),
            label: item => {
              switch (item.dataset.label) {
                case DS.DONATIONS:          return ` $${item.parsed.y.toFixed(2)} donated`;
                case DS.YT_CHAT:            return ` YT chat: ${item.parsed.y.toFixed(1)} mpm`;
                case DS.TW_CHAT:            return ` TW chat: ${item.parsed.y.toFixed(1)} mpm`;
                case DS.TOTAL_CHAT:         return ` Total chat: ${item.parsed.y.toFixed(1)} mpm`;
                case DS.YT_ACTIVE_CHATTERS: return ` YT active chatters: ${Math.round(item.parsed.y).toLocaleString()}`;
                case DS.TW_ACTIVE_CHATTERS: return ` TW active chatters: ${Math.round(item.parsed.y).toLocaleString()}`;
                default:                    return ` ${item.dataset.label}: ${Math.round(item.parsed.y).toLocaleString()} viewers`;
              }
            }
          }
        }
      },
      scales: {
        x: {
          type: 'linear',
          grid: { color: t.chartGrid },
          ticks: {
            color: t.chartTick,
            font: { family: "'Share Tech Mono', monospace", size: 10 },
            callback: v => fmtET(v),
            maxTicksLimit: 10,
          }
        },
        yViewers: {
          type: 'linear',
          position: 'left',
          grid: { color: t.chartGrid },
          ticks: {
            color: t.chartTick,
            font: { family: "'Share Tech Mono', monospace", size: 10 },
            callback: v => v.toLocaleString(),
            maxTicksLimit: 6,
          },
          title: { display: false },
        },
        yDonations: {
          type: 'linear',
          position: 'right',
          grid: { drawOnChartArea: false },
          ticks: {
            color: t.donTick,
            font: { family: "'Share Tech Mono', monospace", size: 10 },
            callback: v => '$' + v.toFixed(0),
            maxTicksLimit: 5,
          },
          title: { display: false },
        },
        yChatRate: {
          type: 'linear',
          position: 'right',
          grid: { drawOnChartArea: false },
          display: hasChatRate,
          ticks: {
            color: '#808070',
            font: { family: "'Share Tech Mono', monospace", size: 10 },
            callback: v => v.toFixed(0) + ' mpm',
            maxTicksLimit: 5,
          },
          title: {
            display: true,
            text: 'Messages / min',
            color: '#606050',
            font: { family: "'Share Tech Mono', monospace", size: 9 },
          },
        },
      }
    }
  });
}

// ── Interactive legend ─────────────────────────────────────────────────────────
function buildLegend(hasYT, hasTW, hasChatRate, hasDonations, hasActiveYT, hasActiveTW) {
  const container = document.getElementById('chartLegend');
  if (!container || !currentChart) return;

  // Each entry: { label, type ('line'|'dashed'|'bar'), color, dsLabel }
  const items = [];

  if (hasYT)       items.push({ label: 'YT Viewers',        type: 'line',   color: '#c0392b', ds: DS.YT_VIEWERS });
  if (hasTW)       items.push({ label: 'TW Viewers',        type: 'line',   color: '#7b4fa6', ds: DS.TW_VIEWERS });
  if (hasActiveYT) items.push({ label: 'YT Active Chatters', type: 'dashed', color: '#e8952a', ds: DS.YT_ACTIVE_CHATTERS });
  if (hasActiveTW) items.push({ label: 'TW Active Chatters', type: 'dashed', color: '#b07de0', ds: DS.TW_ACTIVE_CHATTERS });
  if (hasDonations) items.push({ label: 'Donations',        type: 'bar',    color: '#c47d2a', ds: DS.DONATIONS  });

  if (hasChatRate) {
    items.push({ label: null }); // divider
    if (hasYT) items.push({ label: 'YT Chat',    type: 'dashed', color: '#e05545', ds: DS.YT_CHAT    });
    if (hasTW) items.push({ label: 'TW Chat',    type: 'dashed', color: '#9b70d0', ds: DS.TW_CHAT    });
    items.push(   { label: 'Total Chat', type: 'dashed', color: '#a0a090', ds: DS.TOTAL_CHAT });
  }

  container.innerHTML = '';

  for (const item of items) {
    if (item.label === null) {
      // Divider
      const div = document.createElement('span');
      div.className = 'legend-divider';
      container.appendChild(div);
      continue;
    }

    const span = document.createElement('span');
    span.className = 'legend-item';
    span.dataset.ds = item.ds;

    let indicator;
    if (item.type === 'bar') {
      indicator = `<span class="legend-swatch" style="background:${item.color};"></span>`;
    } else if (item.type === 'dashed') {
      // Dashed line indicator: two short segments with a gap
      indicator = `<svg width="20" height="8" style="flex-shrink:0;"><line x1="0" y1="4" x2="7" y2="4" stroke="${item.color}" stroke-width="2"/><line x1="11" y1="4" x2="20" y2="4" stroke="${item.color}" stroke-width="2"/></svg>`;
    } else {
      indicator = `<span class="legend-line" style="background:${item.color};"></span>`;
    }

    span.innerHTML = `${indicator}${item.label}`;

    span.addEventListener('click', () => {
      const dsIndex = currentChart.data.datasets.findIndex(d => d.label === item.ds);
      if (dsIndex === -1) return;
      const visible = currentChart.isDatasetVisible(dsIndex);
      currentChart.setDatasetVisibility(dsIndex, !visible);
      currentChart.update();
      span.classList.toggle('hidden', visible);
    });

    container.appendChild(span);
  }
}

loadStreamList();
</script>

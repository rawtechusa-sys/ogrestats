<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Lora:ital,wght@0,400;0,500;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link id="theme-css" rel="stylesheet" href="themes/bog-moss.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: transparent;
    color: var(--text-primary);
    font-family: 'Lora', serif;
    font-size: 16px;
    line-height: 1.6;
    overflow: hidden;
  }

  .page {
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 20px 24px;
    gap: 16px;
  }

  /* ── Title row ─────────────────────────────────────────────── */
  .title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-shrink: 0;
  }

  .page-title {
    font-family: 'Rye', serif;
    font-size: 20px;
    color: var(--accent-bright);
    letter-spacing: 0.06em;
  }

  .title-left {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  /* Shared small-button look (matches the donor trigger) */
  .btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    background: var(--bg-panel);
    color: var(--text-muted);
    border: 1px solid var(--border-default-strong);
    border-radius: 4px;
    padding: 5px 10px;
    cursor: pointer;
    outline: none;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent-bright); }

  .card-controls { display: flex; gap: 6px; }

  /* ── Donor dropdown ────────────────────────────────────────── */
  .donor-dropdown { position: relative; flex-shrink: 0; }

  .donor-trigger {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    background: var(--bg-panel);
    color: var(--text-muted);
    border: 1px solid var(--border-default-strong);
    border-radius: 4px;
    padding: 5px 10px;
    cursor: pointer;
    outline: none;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .donor-trigger:hover { border-color: var(--accent); color: var(--accent-bright); }
  .donor-trigger .caret { margin-left: 6px; opacity: 0.7; }

  .donor-panel {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    z-index: 10;
    width: 240px;
    max-height: 320px;
    overflow-y: auto;
    background: var(--bg-surface);
    border: 1px solid var(--border-default-strong);
    border-radius: 6px;
    padding: 4px;
    display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.45);
  }
  .donor-panel.open { display: block; }
  .donor-panel::-webkit-scrollbar { width: 4px; }
  .donor-panel::-webkit-scrollbar-track { background: transparent; }
  .donor-panel::-webkit-scrollbar-thumb { background: var(--bg-raised); border-radius: 2px; }

  .donor-opt {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text-primary);
    padding: 5px 8px;
    border-radius: 4px;
    cursor: pointer;
    user-select: none;
  }
  .donor-opt:hover { background: rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.06); }
  .donor-opt input { accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
  .donor-opt .count { margin-left: auto; color: var(--text-muted); font-size: 11px; }
  .donor-opt.all {
    border-bottom: 1px solid var(--border-default);
    margin-bottom: 4px;
    color: var(--accent-bright);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .donor-opt.all .all-check { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .donor-invert {
    margin-left: auto;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border-default-strong);
    border-radius: 3px;
    padding: 2px 7px;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .donor-invert:hover { border-color: var(--accent); color: var(--accent-bright); }

  /* ── Cards ─────────────────────────────────────────────────── */
  .cards {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    flex-shrink: 0;
    max-height: 38vh;
    overflow-y: auto;
    padding-right: 4px;
  }
  .cards::-webkit-scrollbar { width: 4px; }
  .cards::-webkit-scrollbar-track { background: transparent; }
  .cards::-webkit-scrollbar-thumb { background: var(--bg-raised); border-radius: 2px; }

  .tts-card {
    background: var(--bg-panel);
    border: 1px solid var(--border-default);
    border-radius: 6px;
    width: 210px;
    height: 168px;          /* fixed so cards align regardless of summary length */
    cursor: pointer;
    position: relative;
    overflow: hidden;
    text-align: center;
    transition: border-color 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    opacity: 0.4;
  }
  .tts-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-bright), transparent);
    opacity: 0;
    transition: opacity 0.15s ease;
    z-index: 2;
  }
  .tts-card:hover { border-color: var(--border-default-strong); }
  .tts-card.active {
    opacity: 1;
    border-color: var(--accent);
    background: rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.06);
  }
  .tts-card.active::before { opacity: 0.5; }

  /* Background image layer: fills the card (cover), sits behind text at 50% brightness */
  .tts-card .card-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    filter: brightness(0.5);
    z-index: 0;
    display: none;          /* shown only once an image actually loads */
  }
  .tts-card.has-bg .card-bg { display: block; }

  /* Text layer above the image */
  .tts-card .card-content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 12px 14px;
  }

  .tts-card .voice {
    font-family: 'Rye', serif;
    font-size: 22px;
    color: var(--accent-bright);
    display: block;
    line-height: 1.1;
    text-shadow: 0 0 12px rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.3),
                 0 1px 3px rgba(0,0,0,0.8);
    word-break: break-word;
    flex-shrink: 0;
  }
  .tts-card .summary {
    flex: 1 1 auto;
    min-height: 0;          /* allow the flex child to shrink and scroll */
    overflow-y: auto;
    margin-top: 6px;
    font-family: 'Lora', serif;
    font-size: 12px;
    line-height: 1.35;
    color: var(--text-primary);
    text-shadow: 0 1px 3px rgba(0,0,0,0.85);
  }
  .tts-card .summary::-webkit-scrollbar { width: 3px; }
  .tts-card .summary::-webkit-scrollbar-track { background: transparent; }
  .tts-card .summary::-webkit-scrollbar-thumb { background: var(--bg-raised); border-radius: 2px; }
  .tts-card .summary a { color: var(--accent-bright); text-decoration: underline; }
  .tts-card .summary a:hover { color: var(--text-primary); }
  .tts-card .uses {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: block;
    margin-top: 6px;
    flex-shrink: 0;
    text-shadow: 0 1px 3px rgba(0,0,0,0.85);
  }

  /* ── Message list ──────────────────────────────────────────── */
  .list-wrap {
    flex: 1;
    overflow-y: auto;
    background: var(--bg-panel);
    border: 1px solid var(--border-default);
    border-radius: 6px;
  }
  .list-wrap::-webkit-scrollbar { width: 4px; }
  .list-wrap::-webkit-scrollbar-track { background: transparent; }
  .list-wrap::-webkit-scrollbar-thumb { background: var(--bg-raised); border-radius: 2px; }

  .msg {
    padding: 10px 16px;
    border-bottom: 1px solid rgba(100,180,60,0.06);
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .msg:last-child { border-bottom: none; }
  .msg:hover { background: rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.04); }

  .msg-head {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .msg-user {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text-primary);
  }
  .cmd-badge {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 3px;
    border: 1px solid rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.35);
    color: var(--accent-bright);
    background: rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.12);
  }
  .cmd-badge.off { opacity: 0.3; }

  .msg-text {
    font-size: 14px;
    color: var(--text-primary);
    word-break: break-word;
  }
  .msg-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    flex-wrap: wrap;
  }
  .msg-meta a { color: var(--text-muted); text-decoration: none; }
  .msg-meta a:hover { color: var(--accent-bright); }
  .vod-link::before { content: '▶ '; }

  .loading-state, .empty-state, .error-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 300px;
    gap: 12px;
    color: var(--text-muted);
    font-style: italic;
  }
  .loading-glyph {
    font-family: 'Rye', serif;
    font-size: 32px;
    color: var(--accent);
    animation: flicker 2s ease-in-out infinite;
  }
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.6; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="title-row">
    <div class="title-left">
      <div class="page-title">TTS</div>
      <div class="card-controls" id="cardControls" style="display:none;">
        <button class="btn" id="selAll">Select All</button>
        <button class="btn" id="selNone">Select None</button>
        <button class="btn" id="selInvert">Invert Selection</button>
      </div>
    </div>
    <div class="donor-dropdown" id="donorDropdown" style="display:none;">
      <button class="donor-trigger" id="donorTrigger">
        <span id="donorLabel">All donors</span><span class="caret">▾</span>
      </button>
      <div class="donor-panel" id="donorPanel"></div>
    </div>
  </div>

  <div class="cards" id="cards"></div>

  <div class="list-wrap" id="listWrap">
    <div class="loading-state">
      <span class="loading-glyph">~</span>
      <span>summoning the voices...</span>
    </div>
  </div>
</div>

<script src="config.js"></script>

<script>
const RAW = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${BRANCH}`;

// ── Theme (mirrors dents.html / streams.html) ────────────────────────────────
function applyTheme(key) {
  const themes = {
    green: 'themes/bog-moss.css',
    amber: 'themes/firepit.css',
    grey:  'themes/dead-stone.css',
    void:  'themes/the-void.css',
    white: 'themes/onion-layers.css',
  };
  document.getElementById('theme-css').href = themes[key] || themes.green;
}
applyTheme(localStorage.getItem('swamp-theme') || 'green');
window.addEventListener('message', e => { if (e.data?.type === 'theme') applyTheme(e.data.key); });

// Mouse forwarding so the parent's roach/eye animations still react.
document.addEventListener('mousemove', e => {
  try { window.parent.postMessage({ type: 'mousemove', x: e.clientX, y: e.clientY }, '*'); } catch(err) {}
});
document.addEventListener('mouseleave', () => {
  try { window.parent.postMessage({ type: 'mouseleave' }, '*'); } catch(err) {}
});

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${r.status} — ${url}`);
  return r.json();
}
async function fetchText(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${r.status} — ${url}`);
  return r.text();
}
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Minimal inline markdown ──────────────────────────────────────────────────
// Supports [text](url), **bold**, __underline__, *italic*. Input is HTML-escaped
// first, so the only tags that survive are the ones we emit here.
function mdInline(src) {
  let s = escHtml(src);
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (m, text, url) => {
    const safe = /^(https?:|mailto:)/i.test(url) ? url : '#';
    return `<a href="${safe}" target="_blank" rel="noopener noreferrer">${text}</a>`;
  });
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');   // bold (before italic)
  s = s.replace(/__([^_]+)__/g, '<u>$1</u>');                 // underline
  s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');               // italic
  return s;
}

// Parse "Name: description" lines into { lowercasedName: {name, desc} }.
function parseDescriptions(text) {
  const map = {};
  for (const raw of (text || '').split(/\r?\n/)) {
    const line = raw.trim();
    if (!line) continue;
    const idx = line.indexOf(':');
    if (idx === -1) continue;
    const name = line.slice(0, idx).trim();
    const desc = line.slice(idx + 1).trim();
    if (!name) continue;
    map[name.toLowerCase()] = { name, desc };
  }
  return map;
}

// Find a background image for a voice by trying name-casing variants × common
// web image extensions; sets it on the card once one loads (filenames are
// case-sensitive on GitHub raw / most static hosts, so we try a few spellings).
const BG_EXTS = ['jpg', 'jpeg', 'png', 'webp', 'gif', 'avif'];
function loadCardBackground(cardEl, voice, canonicalName) {
  const cap = voice.charAt(0).toUpperCase() + voice.slice(1);
  const names = [...new Set([canonicalName, cap, voice, voice.toUpperCase()].filter(Boolean))];
  const candidates = [];
  for (const n of names) for (const e of BG_EXTS) candidates.push(`${RAW}/tts-backgrounds/${encodeURIComponent(n)}.${e}`);

  let i = 0;
  const tryNext = () => {
    if (i >= candidates.length) return;
    const url = candidates[i++];
    const img = new Image();
    img.onload = () => {
      const layer = cardEl.querySelector('.card-bg');
      if (layer) layer.style.backgroundImage = `url("${url}")`;
      cardEl.classList.add('has-bg');
    };
    img.onerror = tryNext;
    img.src = url;
  };
  tryNext();
}

// ── State ────────────────────────────────────────────────────────────────────
let DATA         = null;       // the loaded tts.json
let enabled      = new Set();  // currently toggled-on voices
let donors       = [];         // [{name, count}], sorted by count desc
let selected     = new Set();  // currently selected donor names
let DESCRIPTIONS = {};         // { lowercasedVoice: {name, desc} }

// ── Cards ────────────────────────────────────────────────────────────────────
function renderCards() {
  const el = document.getElementById('cards');
  const cmds = Object.entries(DATA.commands || {})
    .sort((a, b) => b[1] - a[1]);   // most-used first

  if (!cmds.length) { el.innerHTML = ''; return; }

  el.innerHTML = cmds.map(([voice, count]) => {
    const on = enabled.has(voice);
    const info = DESCRIPTIONS[voice.toLowerCase()];
    const summary = info && info.desc
      ? `<div class="summary">${mdInline(info.desc)}</div>`
      : '<div class="summary"></div>';
    return `<div class="tts-card${on ? ' active' : ''}" data-voice="${escHtml(voice)}">
      <div class="card-bg"></div>
      <div class="card-content">
        <span class="voice">${escHtml(voice)}</span>
        ${summary}
        <span class="uses">${count} use${count === 1 ? '' : 's'}</span>
      </div>
    </div>`;
  }).join('');

  el.querySelectorAll('.tts-card').forEach(card => {
    const voice = card.dataset.voice;
    const info = DESCRIPTIONS[voice.toLowerCase()];
    loadCardBackground(card, voice, info && info.name);

    card.addEventListener('click', e => {
      // Let links inside the summary work without toggling the card.
      if (e.target.closest('a')) return;
      if (enabled.has(voice)) enabled.delete(voice); else enabled.add(voice);
      card.classList.toggle('active', enabled.has(voice));
      renderMessages();
    });
  });
}

// Toggle .active on existing cards without rebuilding them (avoids reloading
// the background images on every Select All / None / Invert).
function syncCardClasses() {
  document.querySelectorAll('#cards .tts-card').forEach(card => {
    card.classList.toggle('active', enabled.has(card.dataset.voice));
  });
}

// ── Card selection controls ──────────────────────────────────────────────────
function wireCardControls() {
  document.getElementById('cardControls').style.display = '';
  const allVoices = () => Object.keys(DATA.commands || {});

  document.getElementById('selAll').addEventListener('click', () => {
    enabled = new Set(allVoices());
    syncCardClasses();
    renderMessages();
  });
  document.getElementById('selNone').addEventListener('click', () => {
    enabled = new Set();
    syncCardClasses();
    renderMessages();
  });
  document.getElementById('selInvert').addEventListener('click', () => {
    enabled = new Set(allVoices().filter(v => !enabled.has(v)));
    syncCardClasses();
    renderMessages();
  });
}

// ── Donor dropdown ───────────────────────────────────────────────────────────
function buildDonors() {
  const counts = {};
  for (const m of DATA.messages || []) {
    counts[m.username] = (counts[m.username] || 0) + 1;
  }
  donors = Object.entries(counts)
    .map(([name, count]) => ({ name, count }))
    .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));
  selected = new Set(donors.map(d => d.name));   // default: all selected
}

function updateDonorLabel() {
  const label = document.getElementById('donorLabel');
  if (selected.size === donors.length) label.textContent = 'All donors';
  else if (selected.size === 0)        label.textContent = 'No donors';
  else if (selected.size === 1)        label.textContent = [...selected][0];
  else                                 label.textContent = `${selected.size} donors`;
}

function renderDonorPanel() {
  const panel = document.getElementById('donorPanel');
  const allChecked = selected.size === donors.length;
  const opts = donors.map(d => `
    <label class="donor-opt">
      <input type="checkbox" data-donor="${escHtml(d.name)}" ${selected.has(d.name) ? 'checked' : ''}>
      <span>${escHtml(d.name)}</span><span class="count">${d.count}</span>
    </label>`).join('');

  panel.innerHTML = `
    <div class="donor-opt all">
      <label class="all-check">
        <input type="checkbox" id="donorAll" ${allChecked ? 'checked' : ''}>
        <span>All</span>
      </label>
      <button type="button" class="donor-invert" id="donorInvert">Invert</button>
    </div>${opts}`;

  panel.querySelector('#donorAll').addEventListener('change', e => {
    if (e.target.checked) selected = new Set(donors.map(d => d.name));
    else selected = new Set();
    renderDonorPanel();
    updateDonorLabel();
    renderMessages();
  });

  panel.querySelector('#donorInvert').addEventListener('click', e => {
    e.stopPropagation();
    selected = new Set(donors.filter(d => !selected.has(d.name)).map(d => d.name));
    renderDonorPanel();
    updateDonorLabel();
    renderMessages();
  });

  panel.querySelectorAll('input[data-donor]').forEach(cb => {
    cb.addEventListener('change', () => {
      const name = cb.dataset.donor;
      if (cb.checked) selected.add(name); else selected.delete(name);
      // Keep the "All" box in sync without rebuilding the whole list.
      panel.querySelector('#donorAll').checked = selected.size === donors.length;
      updateDonorLabel();
      renderMessages();
    });
  });
}

function wireDonorDropdown() {
  const dd = document.getElementById('donorDropdown');
  const trigger = document.getElementById('donorTrigger');
  const panel = document.getElementById('donorPanel');
  dd.style.display = '';
  trigger.addEventListener('click', e => {
    e.stopPropagation();
    panel.classList.toggle('open');
  });
  document.addEventListener('click', e => {
    if (!dd.contains(e.target)) panel.classList.remove('open');
  });
  renderDonorPanel();
  updateDonorLabel();
}

// ── Message list ─────────────────────────────────────────────────────────────
function streamLabel(streamId) {
  const s = (DATA.streams || {})[streamId] || {};
  return s.title || streamId;
}

function vodLink(m) {
  const s = (DATA.streams || {})[m.stream_id] || {};
  if (!s.youtube_archive_id || s.start_ts == null || m.ts == null) return '';
  const offset = Math.max(0, m.ts - s.start_ts);
  const href = `https://www.youtube.com/watch?v=${encodeURIComponent(s.youtube_archive_id)}&t=${offset}s`;
  return `<a class="vod-link" href="${href}" target="_blank" rel="noopener noreferrer">VOD</a>`;
}

function fmtDate(ts) {
  if (ts == null) return '';
  try { return new Date(ts * 1000).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }); }
  catch { return ''; }
}

function renderMessages() {
  const wrap = document.getElementById('listWrap');
  const msgs = (DATA.messages || []).filter(m =>
    m.commands.some(c => enabled.has(c)) && selected.has(m.username)
  );

  if (!msgs.length) {
    wrap.innerHTML = '<div class="empty-state"><span class="loading-glyph" style="font-size:40px;">☽</span><span>no messages match the current filters</span></div>';
    return;
  }

  wrap.innerHTML = msgs.map(m => {
    const badges = m.commands.map(c =>
      `<span class="cmd-badge${enabled.has(c) ? '' : ' off'}">${escHtml(c)}</span>`
    ).join('');
    const vod = vodLink(m);
    const meta = [
      `<span>${escHtml(streamLabel(m.stream_id))}</span>`,
      fmtDate(m.ts) ? `<span>${fmtDate(m.ts)}</span>` : '',
      vod,
    ].filter(Boolean).join('<span style="opacity:0.4;">·</span>');

    return `<div class="msg">
      <div class="msg-head">
        <span class="msg-user">${escHtml(m.username)}</span>
        ${badges}
      </div>
      <div class="msg-text">${escHtml(m.message)}</div>
      <div class="msg-meta">${meta}</div>
    </div>`;
  }).join('');
}

// ── Load ─────────────────────────────────────────────────────────────────────
async function load() {
  const wrap = document.getElementById('listWrap');
  try {
    DATA = await fetchJSON(`${RAW}/data/tts.json`);

    const hasCommands = DATA.commands && Object.keys(DATA.commands).length > 0;
    if (!hasCommands) {
      document.getElementById('cards').innerHTML = '';
      wrap.innerHTML = '<div class="empty-state"><span class="loading-glyph" style="font-size:40px;">☽</span><span>no TTS commands recorded yet</span></div>';
      return;
    }

    // Descriptions are optional — don't fail the page if the file is missing.
    try {
      DESCRIPTIONS = parseDescriptions(await fetchText(`${RAW}/tts-descriptions.md`));
    } catch (e) {
      DESCRIPTIONS = {};
    }

    enabled = new Set(Object.keys(DATA.commands));   // default: all voices on
    buildDonors();
    renderCards();
    wireCardControls();
    wireDonorDropdown();
    renderMessages();

  } catch (e) {
    wrap.innerHTML = `<div class="error-state"><span class="loading-glyph">✕</span><span>couldn't load TTS data<br><small>${escHtml(e.message)}</small></span></div>`;
  }
}

load();
</script>
</body>
</html>

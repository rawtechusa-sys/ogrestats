<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Standalone guard: these pages are meant to live inside the index.html shell
     (which owns the tabs, theme and background). If loaded top-level, bounce into
     the shell at this page's tab, carrying any deep-link sub-slug. -->
<script>(function(){
  if (window.self !== window.top) return;            // embedded in the shell -> normal
  var slug = 'tts';
  var sub  = location.hash.replace(/^#/, '');
  location.replace('index.html#' + slug + (sub ? '/' + sub : ''));
})();</script>
<title>TTS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Lora:ital,wght@0,400;0,500;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link id="theme-css" rel="stylesheet" href="themes/bog-moss.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: transparent;
    color: var(--text-primary);
    font-family: 'Lora', serif;
    font-size: 16px;
    line-height: 1.6;
    overflow: hidden;
  }

  .page {
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 20px 24px;
    gap: 16px;
  }

  /* ── Title row ─────────────────────────────────────────────── */
  .title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-shrink: 0;
  }

  .page-title {
    font-family: 'Rye', serif;
    font-size: 20px;
    color: var(--accent-bright);
    letter-spacing: 0.06em;
  }

  .title-left {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  /* Shared small-button look (matches the donor trigger) */
  .btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    background: var(--bg-panel);
    color: var(--text-muted);
    border: 1px solid var(--border-default-strong);
    border-radius: 4px;
    padding: 5px 10px;
    cursor: pointer;
    outline: none;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent-bright); }

  .card-controls { display: flex; gap: 6px; }

  /* ── Donor dropdown ────────────────────────────────────────── */
  .donor-dropdown { position: relative; flex-shrink: 0; }

  .donor-trigger {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    background: var(--bg-panel);
    color: var(--text-muted);
    border: 1px solid var(--border-default-strong);
    border-radius: 4px;
    padding: 5px 10px;
    cursor: pointer;
    outline: none;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .donor-trigger:hover { border-color: var(--accent); color: var(--accent-bright); }
  .donor-trigger .caret { margin-left: 6px; opacity: 0.7; }

  .donor-panel {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    z-index: 10;
    width: 240px;
    max-height: 320px;
    overflow-y: auto;
    background: var(--bg-surface);
    border: 1px solid var(--border-default-strong);
    border-radius: 6px;
    padding: 4px;
    display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.45);
  }
  .donor-panel.open { display: block; }
  .donor-panel::-webkit-scrollbar { width: 4px; }
  .donor-panel::-webkit-scrollbar-track { background: transparent; }
  .donor-panel::-webkit-scrollbar-thumb { background: var(--bg-raised); border-radius: 2px; }

  .donor-opt {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text-primary);
    padding: 5px 8px;
    border-radius: 4px;
    cursor: pointer;
    user-select: none;
  }
  .donor-opt:hover { background: rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.06); }
  .donor-opt input { accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
  .donor-opt .count { margin-left: auto; color: var(--text-muted); font-size: 11px; }
  .donor-opt.all {
    border-bottom: 1px solid var(--border-default);
    margin-bottom: 4px;
    color: var(--accent-bright);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .donor-opt.all .all-check { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .donor-invert {
    margin-left: auto;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border-default-strong);
    border-radius: 3px;
    padding: 2px 7px;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .donor-invert:hover { border-color: var(--accent); color: var(--accent-bright); }

  /* ── Scroll section (cards + list share one scrollbar) ─────── */
  .scroll-area {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding-right: 4px;
  }
  .scroll-area::-webkit-scrollbar { width: 4px; }
  .scroll-area::-webkit-scrollbar-track { background: transparent; }
  .scroll-area::-webkit-scrollbar-thumb { background: var(--bg-raised); border-radius: 2px; }

  /* ── Cards ─────────────────────────────────────────────────── */
  .cards {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    flex-shrink: 0;
    align-items: flex-start;   /* cards size to their own content, top-aligned */
  }

  .tts-card {
    background: var(--bg-panel);
    border: 1px solid var(--border-default);
    border-radius: 6px;
    min-width: 130px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    text-align: center;
    transition: border-color 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    opacity: 0.4;
  }
  .tts-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-bright), transparent);
    opacity: 0;
    transition: opacity 0.15s ease;
    z-index: 2;
  }
  .tts-card:hover { border-color: var(--border-default-strong); }
  .tts-card.active {
    opacity: 1;
    border-color: var(--accent);
    background: rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.06);
  }
  .tts-card.active::before { opacity: 0.5; }

  /* Background image layer: fills the card (cover), sits behind text at 50% brightness */
  .tts-card .card-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    filter: brightness(0.5);
    z-index: 0;
    display: none;          /* shown only once an image actually loads */
  }
  .tts-card.has-bg .card-bg { display: block; }

  /* White (Onion Layers) theme: text on cards is dark, so lighten the image
     instead of darkening it, and swap the dark text halos for light ones. */
  html[data-theme="white"] .tts-card .card-bg { filter: brightness(1.6); opacity: 0.5; }
  /* Light scrim over the faded image so dark text always has a readable base,
     even on dark source artwork. */
  html[data-theme="white"] .tts-card.has-bg .card-content::before {
    content: '';
    position: absolute;
    inset: -8px -10px;
    background: radial-gradient(ellipse at center, rgba(251,247,238,0.82) 0%, rgba(251,247,238,0.55) 70%, transparent 100%);
    z-index: -1;
    pointer-events: none;
  }
  html[data-theme="white"] .tts-card .voice {
    text-shadow: 0 1px 2px rgba(255,250,240,1), 0 0 10px rgba(255,250,240,0.9);
  }
  html[data-theme="white"] .tts-card .summary {
    text-shadow: 0 1px 2px rgba(255,250,240,1), 0 0 6px rgba(255,250,240,0.85);
  }

  /* Text layer above the image */
  .tts-card .card-content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    padding: 12px 14px;
    transition: padding 0.2s ease;
  }

  .tts-card .voice {
    font-family: 'Rye', serif;
    font-size: 22px;
    color: var(--accent-bright);
    display: block;
    line-height: 1.1;
    text-shadow: 0 0 12px rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.3),
                 0 1px 3px rgba(0,0,0,0.8);
    word-break: break-word;
    flex-shrink: 0;
    transition: font-size 0.2s ease;
  }
  .tts-card .summary {
    margin-top: 6px;
    max-width: 240px;       /* let long descriptions wrap instead of stretching the card */
    max-height: 320px;
    overflow: hidden;
    font-family: 'Lora', serif;
    font-size: 12px;
    line-height: 1.35;
    color: var(--text-primary);
    text-shadow: 0 1px 3px rgba(0,0,0,0.85);
    transition: max-height 0.2s ease, max-width 0.2s ease, opacity 0.2s ease, margin-top 0.2s ease;
  }
  /* Deselected cards collapse — both the description and their overall width. */
  .tts-card:not(.active) { min-width: 0; }
  .tts-card:not(.active) .card-content { padding: 8px 11px; }
  .tts-card:not(.active) .voice { font-size: 15px; }
  .tts-card:not(.active) .summary {
    max-height: 0;
    max-width: 0;        /* so the collapsed description no longer dictates card width */
    opacity: 0;
    margin-top: 0;
  }
  .tts-card:not(.active) .uses { font-size: 10px; margin-top: 3px; }
  .tts-card .summary a { color: var(--accent-bright); text-decoration: underline; }
  .tts-card .summary a:hover { color: var(--text-primary); }
  .tts-card .uses {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: block;
    margin-top: 6px;
    flex-shrink: 0;
    text-shadow: 0 1px 3px rgba(0,0,0,0.85);
    transition: font-size 0.2s ease, margin-top 0.2s ease;
  }

  /* ── Message list ──────────────────────────────────────────── */
  .list-wrap {
    flex-shrink: 0;
    background: var(--bg-panel);
    border: 1px solid var(--border-default);
    border-radius: 6px;
  }

  .msg {
    padding: 10px 16px;
    border-bottom: 1px solid rgba(100,180,60,0.06);
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .msg:last-child { border-bottom: none; }
  .msg:hover { background: rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.04); }

  .msg-head {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .msg-user {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text-primary);
  }
  .cmd-badge {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 3px;
    border: 1px solid rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.35);
    color: var(--accent-bright);
    background: rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.12);
  }
  .cmd-badge.off { opacity: 0.3; }

  .msg-text {
    font-size: 14px;
    color: var(--text-primary);
    word-break: break-word;
  }
  .msg-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    flex-wrap: wrap;
  }
  .msg-meta a { color: var(--text-muted); text-decoration: none; }
  .msg-meta a:hover { color: var(--accent-bright); }
  .vod-link::before { content: '▶ '; }

  .loading-state, .empty-state, .error-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 300px;
    gap: 12px;
    color: var(--text-muted);
    font-style: italic;
  }
  .loading-glyph {
    font-family: 'Rye', serif;
    font-size: 32px;
    color: var(--accent);
    animation: flicker 2s ease-in-out infinite;
  }
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.6; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="title-row">
    <div class="title-left">
      <div class="page-title">TTS</div>
      <div class="card-controls" id="cardControls" style="display:none;">
        <button class="btn" id="selAll">Select All</button>
        <button class="btn" id="selNone">Select None</button>
        <button class="btn" id="selInvert">Invert Selection</button>
      </div>
    </div>
    <div class="donor-dropdown" id="donorDropdown" style="display:none;">
      <button class="donor-trigger" id="donorTrigger">
        <span id="donorLabel">All donors</span><span class="caret">▾</span>
      </button>
      <div class="donor-panel" id="donorPanel"></div>
    </div>
  </div>

  <div class="scroll-area">
    <div class="cards" id="cards"></div>

    <div class="list-wrap" id="listWrap">
      <div class="loading-state">
        <span class="loading-glyph">~</span>
        <span>summoning the voices...</span>
      </div>
    </div>
  </div>
</div>

<script src="config.js"></script>

<script>
const RAW = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${BRANCH}`;

// ── Theme (mirrors dents.html / streams.html) ────────────────────────────────
function applyTheme(key) {
  const themes = {
    green: 'themes/bog-moss.css',
    amber: 'themes/firepit.css',
    grey:  'themes/dead-stone.css',
    void:  'themes/the-void.css',
    white: 'themes/onion-layers.css',
  };
  document.getElementById('theme-css').href = themes[key] || themes.green;
  document.documentElement.setAttribute('data-theme', key);
}
applyTheme(localStorage.getItem('swamp-theme') || 'green');
window.addEventListener('message', e => {
  if (e.data?.type === 'theme') applyTheme(e.data.key);
  else if (e.data?.type === 'timezone') renderMessages();   // live timezone switch
});

// Mouse forwarding so the parent's roach/eye animations still react.
document.addEventListener('mousemove', e => {
  try { window.parent.postMessage({ type: 'mousemove', x: e.clientX, y: e.clientY }, '*'); } catch(err) {}
});
document.addEventListener('mouseleave', () => {
  try { window.parent.postMessage({ type: 'mouseleave' }, '*'); } catch(err) {}
});

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${r.status} — ${url}`);
  return r.json();
}
async function fetchText(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${r.status} — ${url}`);
  return r.text();
}
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Minimal inline markdown ──────────────────────────────────────────────────
// Supports [text](url), **bold**, __underline__, *italic*. Input is HTML-escaped
// first, so the only tags that survive are the ones we emit here.
function mdInline(src) {
  let s = escHtml(src);
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (m, text, url) => {
    const safe = /^(https?:|mailto:)/i.test(url) ? url : '#';
    return `<a href="${safe}" target="_blank" rel="noopener noreferrer">${text}</a>`;
  });
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');   // bold (before italic)
  s = s.replace(/__([^_]+)__/g, '<u>$1</u>');                 // underline
  s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');               // italic
  return s;
}

// Parse "Name: description" lines into { lowercasedName: {name, desc} }.
function parseDescriptions(text) {
  const map = {};
  for (const raw of (text || '').split(/\r?\n/)) {
    const line = raw.trim();
    if (!line) continue;
    const idx = line.indexOf(':');
    if (idx === -1) continue;
    const name = line.slice(0, idx).trim();
    const desc = line.slice(idx + 1).trim();
    if (!name) continue;
    map[name.toLowerCase()] = { name, desc };
  }
  return map;
}

// Find a background image for a voice by trying name-casing variants × common
// web image extensions; sets it on the card once one loads (filenames are
// case-sensitive on GitHub raw / most static hosts, so we try a few spellings).
const BG_EXTS = ['jpg', 'jpeg', 'png', 'webp', 'gif', 'avif'];
function loadCardBackground(cardEl, voice, canonicalName) {
  const cap = voice.charAt(0).toUpperCase() + voice.slice(1);
  const names = [...new Set([canonicalName, cap, voice, voice.toUpperCase()].filter(Boolean))];
  const candidates = [];
  for (const n of names) for (const e of BG_EXTS) candidates.push(`${RAW}/tts-backgrounds/${encodeURIComponent(n)}.${e}`);

  let i = 0;
  const tryNext = () => {
    if (i >= candidates.length) return;
    const url = candidates[i++];
    const img = new Image();
    img.onload = () => {
      const layer = cardEl.querySelector('.card-bg');
      if (layer) layer.style.backgroundImage = `url("${url}")`;
      cardEl.classList.add('has-bg');
    };
    img.onerror = tryNext;
    img.src = url;
  };
  tryNext();
}

// ── State ────────────────────────────────────────────────────────────────────
let DATA         = null;       // the loaded tts.json
let enabled      = new Set();  // currently toggled-on voices
let donors       = [];         // [{name, count}], sorted by count desc
let selected     = new Set();  // currently selected donor names
let DESCRIPTIONS = {};         // { lowercasedVoice: {name, desc} }
let VOICE_NAMES  = {};         // { lowercasedVoice: canonicalName } from the whitelist
let WHITELIST_ON = false;      // true once tts-voices.txt loads with ≥1 entry

// Parse tts-voices.txt (one voice name per line) into { lowercased: canonical }.
function parseVoices(text) {
  const map = {};
  for (const raw of (text || '').split(/\r?\n/)) {
    const name = raw.trim();
    if (!name || name.startsWith('#')) continue;
    map[name.toLowerCase()] = name;
  }
  return map;
}

// A command counts as a real voice only if it's whitelisted (or, as a safety
// fallback, if the whitelist failed to load so we don't hide everything).
function isVoice(c) {
  return !WHITELIST_ON || Object.prototype.hasOwnProperty.call(VOICE_NAMES, String(c).toLowerCase());
}

// Proper-case display name: whitelist first (covers every voice), then the
// descriptions file, else just capitalize the lowercased key.
function displayName(voice) {
  const lc = voice.toLowerCase();
  const info = DESCRIPTIONS[lc];
  return VOICE_NAMES[lc] || (info && info.name) || voice.charAt(0).toUpperCase() + voice.slice(1);
}

// ── Cards ────────────────────────────────────────────────────────────────────
function renderCards() {
  const el = document.getElementById('cards');
  const cmds = Object.entries(DATA.commands || {})
    .filter(([voice]) => isVoice(voice))   // only whitelisted voices
    .sort((a, b) => b[1] - a[1]);          // most-used first

  if (!cmds.length) { el.innerHTML = ''; return; }

  el.innerHTML = cmds.map(([voice, count]) => {
    const on = enabled.has(voice);
    const info = DESCRIPTIONS[voice.toLowerCase()];
    const summary = info && info.desc
      ? `<div class="summary">${mdInline(info.desc)}</div>`
      : '';
    return `<div class="tts-card${on ? ' active' : ''}" data-voice="${escHtml(voice)}">
      <div class="card-bg"></div>
      <div class="card-content">
        <span class="voice">${escHtml(displayName(voice))}</span>
        ${summary}
        <span class="uses">${count} use${count === 1 ? '' : 's'}</span>
      </div>
    </div>`;
  }).join('');

  el.querySelectorAll('.tts-card').forEach(card => {
    const voice = card.dataset.voice;
    loadCardBackground(card, voice, displayName(voice));

    card.addEventListener('click', e => {
      // Let links inside the summary work without toggling the card.
      if (e.target.closest('a')) return;
      if (enabled.has(voice)) enabled.delete(voice); else enabled.add(voice);
      card.classList.toggle('active', enabled.has(voice));
      renderMessages();
    });
  });
}

// Toggle .active on existing cards without rebuilding them (avoids reloading
// the background images on every Select All / None / Invert).
function syncCardClasses() {
  document.querySelectorAll('#cards .tts-card').forEach(card => {
    card.classList.toggle('active', enabled.has(card.dataset.voice));
  });
}

// ── Card selection controls ──────────────────────────────────────────────────
function wireCardControls() {
  document.getElementById('cardControls').style.display = '';
  const allVoices = () => Object.keys(DATA.commands || {}).filter(isVoice);

  document.getElementById('selAll').addEventListener('click', () => {
    enabled = new Set(allVoices());
    syncCardClasses();
    renderMessages();
  });
  document.getElementById('selNone').addEventListener('click', () => {
    enabled = new Set();
    syncCardClasses();
    renderMessages();
  });
  document.getElementById('selInvert').addEventListener('click', () => {
    enabled = new Set(allVoices().filter(v => !enabled.has(v)));
    syncCardClasses();
    renderMessages();
  });
}

// ── Donor dropdown ───────────────────────────────────────────────────────────
function buildDonors() {
  const counts = {};
  for (const m of DATA.messages || []) {
    if (!m.commands.some(isVoice)) continue;   // ignore messages with no real voice
    counts[m.username] = (counts[m.username] || 0) + 1;
  }
  donors = Object.entries(counts)
    .map(([name, count]) => ({ name, count }))
    .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));
  selected = new Set(donors.map(d => d.name));   // default: all selected
}

function updateDonorLabel() {
  const label = document.getElementById('donorLabel');
  if (selected.size === donors.length) label.textContent = 'All donors';
  else if (selected.size === 0)        label.textContent = 'No donors';
  else if (selected.size === 1)        label.textContent = [...selected][0];
  else                                 label.textContent = `${selected.size} donors`;
}

function renderDonorPanel() {
  const panel = document.getElementById('donorPanel');
  const allChecked = selected.size === donors.length;
  const opts = donors.map(d => `
    <label class="donor-opt">
      <input type="checkbox" data-donor="${escHtml(d.name)}" ${selected.has(d.name) ? 'checked' : ''}>
      <span>${escHtml(d.name)}</span><span class="count">${d.count}</span>
    </label>`).join('');

  panel.innerHTML = `
    <div class="donor-opt all">
      <label class="all-check">
        <input type="checkbox" id="donorAll" ${allChecked ? 'checked' : ''}>
        <span>All</span>
      </label>
      <button type="button" class="donor-invert" id="donorInvert">Invert</button>
    </div>${opts}`;

  panel.querySelector('#donorAll').addEventListener('change', e => {
    if (e.target.checked) selected = new Set(donors.map(d => d.name));
    else selected = new Set();
    renderDonorPanel();
    updateDonorLabel();
    renderMessages();
  });

  panel.querySelector('#donorInvert').addEventListener('click', e => {
    e.stopPropagation();
    selected = new Set(donors.filter(d => !selected.has(d.name)).map(d => d.name));
    renderDonorPanel();
    updateDonorLabel();
    renderMessages();
  });

  panel.querySelectorAll('input[data-donor]').forEach(cb => {
    cb.addEventListener('change', () => {
      const name = cb.dataset.donor;
      if (cb.checked) selected.add(name); else selected.delete(name);
      // Keep the "All" box in sync without rebuilding the whole list.
      panel.querySelector('#donorAll').checked = selected.size === donors.length;
      updateDonorLabel();
      renderMessages();
    });
  });
}

function wireDonorDropdown() {
  const dd = document.getElementById('donorDropdown');
  const trigger = document.getElementById('donorTrigger');
  const panel = document.getElementById('donorPanel');
  dd.style.display = '';
  trigger.addEventListener('click', e => {
    e.stopPropagation();
    panel.classList.toggle('open');
  });
  document.addEventListener('click', e => {
    if (!dd.contains(e.target)) panel.classList.remove('open');
  });
  renderDonorPanel();
  updateDonorLabel();
}

// ── Message list ─────────────────────────────────────────────────────────────
// The stream name links across to its per-stream view on streams.html
// (deep-linked by slug, mirroring dents.html).
function streamLink(streamId) {
  const s = (DATA.streams || {})[streamId] || {};
  const label = s.title || streamId;
  if (!streamId) return `<span>${escHtml(label)}</span>`;
  return `<a href="streams.html#${encodeURIComponent(streamId)}" target="_blank" rel="noopener noreferrer" title="${escHtml(label)}">${escHtml(label)}</a>`;
}

// ── VOD timestamp deep links (ported from dents.html / streams.html) ──────────
// Each message links to the moment its TTS command fired in the rebroadcast VOD,
// using ts - start_ts as the offset. A normal stream has one youtube_archive_id;
// a split broadcast carries a `segments` array; a durable archive also has an
// archive.org mirror anchored at archive_start_ts. When no archive exists we fall
// back to the source streamer's own VOD.
function fmtElapsed(startTs, ts) {
  const s = Math.max(0, Math.floor(ts - startTs));
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return h > 0
    ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
    : `${m}:${String(sec).padStart(2,'0')}`;
}

function buildVodLink(seg, tSec) {
  if (seg.archive_id)
    return `https://youtu.be/${encodeURIComponent(seg.archive_id)}?t=${tSec}`;
  if (seg.archive_org_id)
    return `https://archive.org/embed/${encodeURIComponent(seg.archive_org_id)}?start=${tSec}`;
  return null;
}

// Fallback when no archive exists: deep-link into the source streamer's own VOD
// at the stream's elapsed offset. YouTube honors ?t=<seconds>; Twitch wants
// ?t=<h>h<m>m<s>s.
function buildSourceLink(smeta, tSec) {
  const id = smeta && smeta.source_vod_id;
  if (!id) return null;
  if (smeta.source_platform === 'twitch') {
    const h = Math.floor(tSec / 3600), m = Math.floor((tSec % 3600) / 60), s = tSec % 60;
    return `https://www.twitch.tv/videos/${encodeURIComponent(id)}?t=${h}h${m}m${s}s`;
  }
  return `https://youtu.be/${encodeURIComponent(id)}?t=${tSec}`;
}

// Prefer an explicit `segments` array, else synthesize a single segment from the
// archive ids anchored at archive_start_ts ?? start_ts.
function streamSegments(smeta) {
  if (!smeta) return [];
  if (Array.isArray(smeta.segments) && smeta.segments.length)
    return [...smeta.segments].sort((a, b) => a.start_ts - b.start_ts);
  if (smeta.youtube_archive_id || smeta.archive_org_id)
    return [{ archive_id: smeta.youtube_archive_id || null,
              archive_org_id: smeta.archive_org_id || null,
              start_ts: smeta.archive_start_ts != null ? smeta.archive_start_ts : smeta.start_ts }];
  return [];
}

// The last segment that had started by ts, clamped to the first.
function segmentFor(segments, ts) {
  let chosen = segments[0] || null;
  for (const seg of segments) {
    if (seg.start_ts <= ts) chosen = seg;
    else break;
  }
  return chosen;
}

// Timestamp span: elapsed H:MM:SS into the stream, linking into the VOD when
// possible -- prefer our archive (per-segment offset), else the source streamer's
// own VOD; plain text only when neither exists.
function tsLink(m) {
  const s = (DATA.streams || {})[m.stream_id] || {};
  const startTs = s.start_ts;
  if (startTs == null || m.ts == null) return '';
  const label = fmtElapsed(startTs, m.ts);
  let href = null;
  const seg = segmentFor(streamSegments(s), m.ts);
  if (seg && seg.start_ts != null) {
    href = buildVodLink(seg, Math.max(0, Math.floor(m.ts - seg.start_ts)));
  }
  if (!href) {
    href = buildSourceLink(s, Math.max(0, Math.floor(m.ts - startTs)));
  }
  return href
    ? `<a class="vod-link" href="${href}" target="_blank" rel="noopener noreferrer">${label}</a>`
    : `<span>${label}</span>`;
}

function fmtDate(ts) {
  if (ts == null) return '';
  try { return new Date(ts * 1000).toLocaleDateString('en-US', withTZ({ year: 'numeric', month: 'short', day: 'numeric' })); }
  catch { return ''; }
}

function renderMessages() {
  const wrap = document.getElementById('listWrap');
  const msgs = (DATA.messages || []).filter(m =>
    m.commands.some(c => enabled.has(c)) && selected.has(m.username)
  );

  if (!msgs.length) {
    wrap.innerHTML = '<div class="empty-state"><span class="loading-glyph" style="font-size:40px;">☽</span><span>no messages match the current filters</span></div>';
    return;
  }

  wrap.innerHTML = msgs.map(m => {
    const badges = m.commands.filter(isVoice).map(c =>
      `<span class="cmd-badge${enabled.has(c) ? '' : ' off'}">${escHtml(displayName(c))}</span>`
    ).join('');
    const meta = [
      streamLink(m.stream_id),
      fmtDate(m.ts) ? `<span>${fmtDate(m.ts)}</span>` : '',
      tsLink(m),
    ].filter(Boolean).join('<span style="opacity:0.4;">·</span>');

    return `<div class="msg">
      <div class="msg-head">
        <span class="msg-user">${escHtml(m.username)}</span>
        ${badges}
      </div>
      <div class="msg-text">${escHtml(m.message)}</div>
      <div class="msg-meta">${meta}</div>
    </div>`;
  }).join('');
}

// ── Load ─────────────────────────────────────────────────────────────────────
async function load() {
  const wrap = document.getElementById('listWrap');
  try {
    DATA = await fetchJSON(`${RAW}/data/tts.json`);

    const hasCommands = DATA.commands && Object.keys(DATA.commands).length > 0;
    if (!hasCommands) {
      document.getElementById('cards').innerHTML = '';
      wrap.innerHTML = '<div class="empty-state"><span class="loading-glyph" style="font-size:40px;">☽</span><span>no TTS commands recorded yet</span></div>';
      return;
    }

    // Descriptions and the voice whitelist are optional — load best-effort so a
    // missing file never breaks the page.
    try {
      DESCRIPTIONS = parseDescriptions(await fetchText(`${RAW}/tts-descriptions.md`));
    } catch (e) {
      DESCRIPTIONS = {};
    }
    try {
      VOICE_NAMES = parseVoices(await fetchText(`${RAW}/tts-voices.txt`));
      WHITELIST_ON = Object.keys(VOICE_NAMES).length > 0;
    } catch (e) {
      VOICE_NAMES = {}; WHITELIST_ON = false;
    }

    // default: all (whitelisted) voices on
    enabled = new Set(Object.keys(DATA.commands).filter(isVoice));
    buildDonors();
    renderCards();
    wireCardControls();
    wireDonorDropdown();
    renderMessages();

  } catch (e) {
    wrap.innerHTML = `<div class="error-state"><span class="loading-glyph">✕</span><span>couldn't load TTS data<br><small>${escHtml(e.message)}</small></span></div>`;
  }
}

load();
</script>
</body>

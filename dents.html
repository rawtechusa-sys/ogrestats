<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dents</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Lora:ital,wght@0,400;0,500;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link id="theme-css" rel="stylesheet" href="themes/bog-moss.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: transparent;
    color: var(--text-primary);
    font-family: 'Lora', serif;
    font-size: 16px;
    line-height: 1.6;
    overflow: hidden;
  }

  .page {
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 20px 24px;
    gap: 16px;
  }

  .page-title {
    font-family: 'Rye', serif;
    font-size: 20px;
    color: var(--accent-bright);
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }

  .table-wrap {
    flex: 1;
    overflow-y: auto;
    background: var(--bg-panel);
    border: 1px solid var(--border-default);
    border-radius: 6px;
  }

  .table-wrap::-webkit-scrollbar { width: 4px; }
  .table-wrap::-webkit-scrollbar-track { background: transparent; }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--bg-raised); border-radius: 2px; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  thead {
    position: sticky;
    top: 0;
    z-index: 1;
    background: var(--bg-surface);
  }

  thead::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: var(--border-default);
  }

  th {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: left;
    padding: 10px 14px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    position: relative;
  }

  th:hover { color: var(--accent); }

  th.sorted { color: var(--accent-bright); }

  .sort-arrow {
    display: inline-block;
    margin-left: 5px;
    opacity: 0.7;
    font-style: normal;
  }

  td {
    padding: 9px 14px;
    border-bottom: 1px solid rgba(100,180,60,0.06);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }

  tr:hover td { background: rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.04); }

  .rank {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    text-align: right;
    width: 36px;
  }

  .username {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text-primary);
  }

  .amount-total {
    font-family: 'Rye', serif;
    font-size: 16px;
    color: var(--accent-bright);
    text-shadow: 0 0 10px rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.3);
    white-space: nowrap;
  }

  .amount-type {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .amount-type.zero { opacity: 0.2; }

  .dsp-dent {
    text-align: center;
    font-size: 16px;
    width: 90px;
    line-height: 1;
  }

  .loading-state, .empty-state, .error-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 300px;
    gap: 12px;
    color: var(--text-muted);
    font-style: italic;
  }

  .loading-glyph {
    font-family: 'Rye', serif;
    font-size: 32px;
    color: var(--accent);
    animation: flicker 2s ease-in-out infinite;
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.6; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="page-title">Dents</div>
  <div class="table-wrap" id="tableWrap">
    <div class="loading-state">
      <span class="loading-glyph">~</span>
      <span>tallying the damage...</span>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
const RAW = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${BRANCH}`;

// Donation types we track and their display labels
const TYPES = [
  { key: 'superchat',      label: 'Superchat'  },
  { key: 'bits',           label: 'Bits'       },
  { key: 'giftsub',        label: 'Gift Sub'   },
  { key: 'sub',            label: 'Sub'        },
  { key: 'membership',     label: 'Membership' },
  { key: 'giftmembership', label: 'Gift Mem'   },
];

// Theme
function applyTheme(key) {
  const themes = {
    green: 'themes/bog-moss.css',
    amber: 'themes/firepit.css',
    grey:  'themes/dead-stone.css',
    void:  'themes/the-void.css',
    white: 'themes/onion-layers.css',
  };
  document.getElementById('theme-css').href = themes[key] || themes.green;
}
applyTheme(localStorage.getItem('swamp-theme') || 'green');
window.addEventListener('message', e => { if (e.data?.type === 'theme') applyTheme(e.data.key); });

// Mouse forwarding
document.addEventListener('mousemove', e => {
  try { window.parent.postMessage({ type: 'mousemove', x: e.clientX, y: e.clientY }, '*'); } catch(err) {}
});
document.addEventListener('mouseleave', () => {
  try { window.parent.postMessage({ type: 'mouseleave' }, '*'); } catch(err) {}
});

// Fetch helpers
async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${r.status} — ${url}`);
  return r.json();
}
async function fetchText(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${r.status} — ${url}`);
  return r.text();
}
function parseJSONL(text) {
  return text.trim().split('\n').filter(Boolean).map(l => {
    try { return JSON.parse(l); } catch { return null; }
  }).filter(Boolean);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── DSP Dent? cross-reference (renton.report via Worker proxy) ───────────────
// Lazy-loads a per-row check against renton.report's viewer dataset. The fuzzy
// /search endpoint can return partial matches, so we verify with a strict
// case-insensitive name match before deciding 'yes'.
//
// Requests go through a Cloudflare Worker proxy (see worker.js in the repo)
// that holds the api-key as a Worker secret and adds CORS headers. Change
// this URL to your deployed worker -- the default after `wrangler deploy` is
// https://renton-proxy.<your-account>.workers.dev
const RENTON_API = 'https://renton-proxy.YOUR-ACCOUNT.workers.dev/api';

const dspDentCache   = new Map();  // username -> 'yes' | 'no'
const dspDentPending = new Map();  // username -> Promise (dedupe in-flight)

// Concurrency limiter -- even with the API key bypass, spawning hundreds of
// simultaneous fetches is wasteful and rude. 6 in flight is plenty given that
// IntersectionObserver only triggers for visible rows anyway.
const rentonQueue = (() => {
  const MAX = 6;
  let inFlight = 0;
  const queue  = [];
  function pump() {
    while (inFlight < MAX && queue.length) {
      const { fn, resolve, reject } = queue.shift();
      inFlight++;
      Promise.resolve().then(fn).then(resolve, reject).finally(() => {
        inFlight--;
        pump();
      });
    }
  }
  return fn => new Promise((resolve, reject) => {
    queue.push({ fn, resolve, reject });
    pump();
  });
})();

async function checkDspDent(username) {
  if (dspDentCache.has(username))   return dspDentCache.get(username);
  if (dspDentPending.has(username)) return dspDentPending.get(username);

  const p = rentonQueue(async () => {
    const url = `${RENTON_API}/viewers/search?q=${encodeURIComponent(username)}&limit=20`;
    const r   = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);

    const data = await r.json();
    // Response envelope shape is undocumented; handle the usual variants.
    const list = Array.isArray(data) ? data
               : data.viewers || data.results || data.data || [];

    // Strict match to avoid false positives from fuzzy search ("DSP" matching "DSP_fan").
    const target = username.toLowerCase().trim();
    const found  = list.some(v => {
      const name = v.display_name || v.displayName || v.username || v.name || '';
      return name.toLowerCase().trim() === target;
    });
    return found ? 'yes' : 'no';
  });

  dspDentPending.set(username, p);
  try {
    const result = await p;
    dspDentCache.set(username, result);
    return result;
  } catch {
    // Don't cache errors -- allow retry next time the row is visible.
    return 'error';
  } finally {
    dspDentPending.delete(username);
  }
}

function dspDentGlyph(state) {
  if (state === 'yes') return '✅';
  if (state === 'no')  return '❌';
  return '❔';
}

// Single observer, rooted on the scrollable table container.
const dspDentObserver = new IntersectionObserver(entries => {
  for (const entry of entries) {
    if (!entry.isIntersecting) continue;
    const cell     = entry.target;
    const username = cell.dataset.username;
    dspDentObserver.unobserve(cell);

    if (dspDentCache.has(username)) {
      cell.textContent = dspDentGlyph(dspDentCache.get(username));
      continue;
    }

    checkDspDent(username).then(result => {
      // Re-sorts rebuild cells, so update every matching cell, not just this one.
      document.querySelectorAll(`.dsp-dent[data-username="${CSS.escape(username)}"]`)
        .forEach(c => { c.textContent = dspDentGlyph(result); });
    });
  }
}, {
  root: document.getElementById('tableWrap'),
  rootMargin: '200px',  // start fetching a bit before the row scrolls in
});

// Re-attach observer to freshly-rendered cells; paint cached values immediately.
function hydrateDspDentCells() {
  document.querySelectorAll('.dsp-dent').forEach(cell => {
    const u = cell.dataset.username;
    if (dspDentCache.has(u)) {
      cell.textContent = dspDentGlyph(dspDentCache.get(u));
    } else {
      cell.textContent = '❔';
      dspDentObserver.observe(cell);
    }
  });
}

// Sort state
let sortKey   = 'total';
let sortAsc   = false;
let tableData = [];

function fmtUSD(n) {
  return n > 0 ? '$' + n.toFixed(2) : '—';
}

function renderTable() {
  const wrap = document.getElementById('tableWrap');
  if (!tableData.length) {
    wrap.innerHTML = '<div class="empty-state"><span class="loading-glyph" style="font-size:40px;">☽</span><span>no donations recorded yet</span></div>';
    return;
  }

  const sorted = [...tableData].sort((a, b) => {
    if (sortKey === 'username') {
      const cmp = a.username.localeCompare(b.username, undefined, { sensitivity: 'base' });
      return sortAsc ? cmp : -cmp;
    }
    if (sortKey === 'dsp_dent') {
      // Rank by cached state: confirmed dents float to the top on desc,
      // unknowns sit between, confirmed non-dents to the bottom.
      const rank = u => {
        const c = dspDentCache.get(u.username);
        return c === 'yes' ? 2 : c === 'no' ? 0 : 1;
      };
      const cmp = rank(a) - rank(b);
      return sortAsc ? cmp : -cmp;
    }
    const av = a[sortKey] ?? 0;
    const bv = b[sortKey] ?? 0;
    return sortAsc ? av - bv : bv - av;
  });

  function arrow(key) {
    if (key !== sortKey) return '';
    return `<span class="sort-arrow">${sortAsc ? '↑' : '↓'}</span>`;
  }

  function thClass(key) {
    return key === sortKey ? 'sorted' : '';
  }

  const typeHeaders = TYPES.map(t =>
    `<th class="${thClass(t.key)}" data-key="${t.key}">${escHtml(t.label)}${arrow(t.key)}</th>`
  ).join('');

  const rows = sorted.map((row, i) => {
    const typeCells = TYPES.map(t => {
      const v = row[t.key] || 0;
      const display = fmtUSD(v);
      return `<td class="amount-type${v === 0 ? ' zero' : ''}">${display}</td>`;
    }).join('');

    return `<tr>
      <td class="rank">${i + 1}</td>
      <td class="username">${escHtml(row.username)}</td>
      <td class="amount-total">${fmtUSD(row.total)}</td>
      <td class="amount-type">${row.streams}</td>
      ${typeCells}
      <td class="dsp-dent" data-username="${escHtml(row.username)}">❔</td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `<table>
    <thead>
      <tr>
        <th style="width:36px;"></th>
        <th class="${thClass('username')}" data-key="username" style="min-width:160px;">Dent${arrow('username')}</th>
        <th class="${thClass('total')}" data-key="total">Total${arrow('total')}</th>
        <th class="${thClass('streams')}" data-key="streams">Streams${arrow('streams')}</th>
        ${typeHeaders}
        <th class="${thClass('dsp_dent')}" data-key="dsp_dent" title="Does this viewer appear on renton.report?">DSP Dent?${arrow('dsp_dent')}</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;

  // Sort on header click
  wrap.querySelectorAll('th[data-key]').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.key;
      if (key === sortKey) {
        sortAsc = !sortAsc;
      } else {
        sortKey = key;
        // Username sorts a→z by default, numbers sort greatest first
        sortAsc = key === 'username';
      }
      renderTable();
    });
  });

  // After every (re)render, repaint cached values and start lazy fetches for the rest.
  hydrateDspDentCells();
}

// Build tableData from a precomputed leaderboard.json object
function loadFromLeaderboard(board) {
  const users = board.users || {};
  tableData = Object.values(users).filter(u => u.total > 0);
}

// Fallback: aggregate from every stream's events.jsonl (the original method).
// Used only when leaderboard.json doesn't exist yet.
async function loadFromStreams() {
  const streamIds = await fetchJSON(`${RAW}/data/streams/index.json`);

  const results = await Promise.allSettled(
    streamIds.map(id => fetchText(`${RAW}/data/streams/${id}/events.jsonl`))
  );

  const byUser = {};

  for (const result of results) {
    if (result.status !== 'fulfilled') continue;
    const events = parseJSONL(result.value);
    const seenInStream = new Set();
    for (const e of events) {
      if (e.event !== 'donation') continue;
      const name = (e.username || 'unknown').replace(/^@+/, '');
      if (!byUser[name]) {
        byUser[name] = { username: name, total: 0, streams: 0 };
        for (const t of TYPES) byUser[name][t.key] = 0;
      }
      seenInStream.add(name);
      const u = byUser[name];
      if (e.type === 'membership') {
        u.membership += 1.99;
        u.total      += 1.99;
      } else if (e.amount_usd != null) {
        u[e.type] = (u[e.type] || 0) + e.amount_usd;
        u.total   += e.amount_usd;
      }
    }
    for (const name of seenInStream) {
      if (byUser[name]) byUser[name].streams += 1;
    }
  }

  tableData = Object.values(byUser).filter(u => u.total > 0);
}

async function load() {
  const wrap = document.getElementById('tableWrap');
  try {
    // Fast path: single precomputed file.
    try {
      const board = await fetchJSON(`${RAW}/data/leaderboard.json`);
      loadFromLeaderboard(board);
    } catch (e) {
      // No leaderboard yet -- fall back to aggregating all streams.
      await loadFromStreams();
    }

    renderTable();

  } catch (e) {
    wrap.innerHTML = `<div class="error-state"><span class="loading-glyph">✕</span><span>couldn't load dents<br><small>${e.message}</small></span></div>`;
  }
}

load();
</script>
</body>
</html>

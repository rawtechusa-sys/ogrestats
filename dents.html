<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Standalone guard: these pages are meant to live inside the index.html shell
     (which owns the tabs, theme and background). If loaded top-level, bounce into
     the shell at this page's tab, carrying any deep-link sub-slug. -->
<script>(function(){
  if (window.self !== window.top) return;            // embedded in the shell -> normal
  var slug = 'dents';
  var sub  = location.hash.replace(/^#/, '');
  location.replace('index.html#' + slug + (sub ? '/' + sub : ''));
})();</script>
<title>Dents</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Lora:ital,wght@0,400;0,500;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link id="theme-css" rel="stylesheet" href="themes/bog-moss.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: transparent;
    color: var(--text-primary);
    font-family: 'Lora', serif;
    font-size: 16px;
    line-height: 1.6;
    overflow: hidden;
  }

  .page {
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 20px 24px;
    gap: 16px;
  }

  .page-title {
    font-family: 'Rye', serif;
    font-size: 20px;
    color: var(--accent-bright);
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }

  .dent-search {
    flex-shrink: 0;
    width: 100%;
    padding: 9px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text-primary);
    background: var(--bg-panel);
    border: 1px solid var(--border-default);
    border-radius: 6px;
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .dent-search::placeholder { color: var(--text-muted); }
  .dent-search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.3);
  }
  /* Tidy the native clear (×) button so it picks up the accent on hover. */
  .dent-search::-webkit-search-cancel-button { cursor: pointer; }

  .table-wrap {
    flex: 1;
    overflow-y: auto;
    background: var(--bg-panel);
    border: 1px solid var(--border-default);
    border-radius: 6px;
  }

  .table-wrap::-webkit-scrollbar { width: 4px; }
  .table-wrap::-webkit-scrollbar-track { background: transparent; }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--bg-raised); border-radius: 2px; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  /* Scope the sticky header to the OUTER table only — the nested per-donor
     donations sub-table has its own <thead> that must scroll with its panel,
     not stick at the top. */
  .table-wrap > table > thead {
    position: sticky;
    top: 0;
    z-index: 3;
    /* Composite the (translucent) theme surface over the opaque base so rows
       scrolling underneath can't bleed through the header. */
    background: linear-gradient(var(--bg-surface), var(--bg-surface)), var(--bg-base);
  }

  .table-wrap > table > thead::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: var(--border-default);
  }

  th {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: left;
    padding: 10px 14px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    position: relative;
  }

  th:hover { color: var(--accent); }

  th.sorted { color: var(--accent-bright); }

  .sort-arrow {
    display: inline-block;
    margin-left: 5px;
    opacity: 0.7;
    font-style: normal;
  }

  td {
    padding: 9px 14px;
    border-bottom: 1px solid rgba(100,180,60,0.06);
    vertical-align: middle;
  }

  /* Donors are now each their own <tbody>; only drop the border on the very
     last row of the table, not the last row of every section. */
  tbody:last-child tr:last-child td { border-bottom: none; }

  tr:hover td { background: rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.04); }

  /* An expanded donor's row pins just below the sticky header so it stays
     visible and clickable (to collapse) while scrolling its donation log.
     Constrained to its own <tbody>, so it releases as the next donor arrives. */
  tr.dent-row.sticky-dent > td {
    position: sticky;
    /* Pull up 1px so the row tucks under the header (which paints on top at a
       higher z-index), closing the sub-pixel gap left by rounded measurement. */
    top: calc(var(--thead-h, 38px) - 1px);
    z-index: 2;
    /* Opaque so the scrolling donation list can't show through the pinned row. */
    background: linear-gradient(var(--bg-panel), var(--bg-panel)), var(--bg-base);
  }
  /* `.zero` cells normally dim via opacity, which would also make the pinned
     row's background translucent and let donations bleed through — keep them
     fully opaque while pinned. */
  tr.dent-row.sticky-dent > td.zero { opacity: 1; }

  .rank {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    text-align: right;
    width: 36px;
  }

  .username {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text-primary);
  }

  .amount-total {
    font-family: 'Rye', serif;
    font-size: 16px;
    color: var(--accent-bright);
    text-shadow: 0 0 10px rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.3);
    white-space: nowrap;
  }

  .amount-type {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .amount-type.zero { opacity: 0.2; }

  .dsp-dent {
    text-align: center;
    font-size: 16px;
    width: 90px;
    line-height: 1;
  }
  .dsp-dent a {
    color: inherit;
    text-decoration: none;
    display: inline-block;
    padding: 2px 4px;
    border-radius: 4px;
  }
  .dsp-dent a:hover {
    background: var(--surface-2, rgba(255,255,255,0.08));
  }

  .loading-state, .empty-state, .error-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 300px;
    gap: 12px;
    color: var(--text-muted);
    font-style: italic;
  }

  .loading-glyph {
    font-family: 'Rye', serif;
    font-size: 32px;
    color: var(--accent);
    animation: flicker 2s ease-in-out infinite;
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.6; }
  }

  /* ── Expandable donor rows ── */
  tr.dent-row { cursor: pointer; }

  .caret {
    display: inline-block;
    width: 1em;
    margin-right: 6px;
    color: var(--text-muted);
    transition: color 0.15s ease;
  }
  tr.dent-row:hover .caret { color: var(--accent-bright); }

  /* The detail row that holds a donor's itemized donations. */
  .donations-row > td {
    padding: 0;
    background: var(--bg-base);
    border-bottom: 1px solid var(--border-default);
  }
  /* Don't apply the generic row-hover accent wash to the panel cell. */
  .donations-row:hover > td { background: var(--bg-base); }

  .donor-panel { padding: 6px 14px 14px 46px; }

  .donor-loading, .donor-empty {
    padding: 14px 0 6px;
    color: var(--text-muted);
    font-style: italic;
    font-size: 14px;
  }

  /* Itemized donations sub-table (ported from streams.html). */
  .donations-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .donations-table th {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: left;
    padding: 4px 8px 8px;
    border-bottom: 1px solid var(--border-default);
  }
  .donations-table td {
    padding: 7px 8px;
    border-bottom: 1px solid rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.07);
    vertical-align: top;
  }
  .donations-table tr:last-child td { border-bottom: none; }
  .donations-table tr:hover td {
    background: rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.05);
  }

  .type-badge {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 3px;
    border: 1px solid;
    white-space: nowrap;
  }
  .type-superchat      { color: #80c8a0; border-color: rgba(80,180,120,0.35); background: rgba(40,120,70,0.2); }
  .type-membership     { color: #80c8a0; border-color: rgba(80,180,120,0.25); background: rgba(30,100,60,0.15); }
  .type-giftmembership { color: #80c8a0; border-color: rgba(80,180,120,0.25); background: rgba(30,100,60,0.15); }
  .type-bits           { color: #b090d0; border-color: rgba(130,80,180,0.35); background: rgba(90,50,140,0.2); }
  .type-giftsub        { color: #b090d0; border-color: rgba(130,80,180,0.25); background: rgba(70,40,110,0.15); }
  .type-sub            { color: #b090d0; border-color: rgba(130,80,180,0.25); background: rgba(70,40,110,0.15); }

  /* White (Onion Layers) theme: darker text on lighter fills for legibility. */
  html[data-theme="white"] .donations-table td {
    border-bottom-color: rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.16);
  }
  html[data-theme="white"] .type-superchat,
  html[data-theme="white"] .type-membership,
  html[data-theme="white"] .type-giftmembership { color: #237046; border-color: rgba(35,112,70,0.45); background: rgba(35,112,70,0.13); }
  html[data-theme="white"] .type-bits,
  html[data-theme="white"] .type-giftsub,
  html[data-theme="white"] .type-sub { color: #54338a; border-color: rgba(90,58,140,0.45); background: rgba(90,58,140,0.13); }

  .donations-table .ts-cell  { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .donations-table .amount-usd { font-family: 'Share Tech Mono', monospace; color: var(--accent); font-size: 13px; white-space: nowrap; }
  .donations-table .msg-cell { font-family: 'Lora', serif; color: var(--text-muted); font-size: 13px; word-break: break-word; }
  .stream-link {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px dotted rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.4);
    transition: color 0.15s ease, border-color 0.15s ease;
    /* Truncate long stream titles; full name shown via the title tooltip. */
    display: inline-block;
    max-width: 400px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    vertical-align: bottom;
  }
  .stream-link:hover { color: var(--accent-bright); border-bottom-color: var(--accent-bright); }

  .ts-link {
    color: var(--accent);
    text-decoration: none;
    white-space: nowrap;
    border-bottom: 1px dotted rgba(var(--accent-glow-r),var(--accent-glow-g),var(--accent-glow-b),0.4);
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  .ts-link:hover { color: var(--accent-bright); border-bottom-color: var(--accent-bright); }
</style>
</head>
<body>

<div class="page">
  <div class="page-title">Dents</div>
  <input id="dentSearch" class="dent-search" type="search"
         placeholder="search dents…" autocomplete="off" spellcheck="false">
  <div class="table-wrap" id="tableWrap">
    <div class="loading-state">
      <span class="loading-glyph">~</span>
      <span>tallying the damage...</span>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="secrets.js"></script>
<!-- secrets.js was previously used for client-side renton.report calls; the
     DSP Dent? column is now populated by the backend and read from
     leaderboard.json directly. The script tag is harmless if the file is
     still being generated; remove the GitHub Actions step too when you
     get around to cleanup. -->

<script>
const RAW = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${BRANCH}`;

// Donation types we track and their display labels
const TYPES = [
  { key: 'superchat',      label: 'Superchat'  },
  { key: 'bits',           label: 'Bits'       },
  { key: 'giftsub',        label: 'Gift Sub'   },
  { key: 'sub',            label: 'Sub'        },
  { key: 'membership',     label: 'Membership' },
  { key: 'giftmembership', label: 'Gift Mem'   },
];

// Theme
function applyTheme(key) {
  const themes = {
    green: 'themes/bog-moss.css',
    amber: 'themes/firepit.css',
    grey:  'themes/dead-stone.css',
    void:  'themes/the-void.css',
    white: 'themes/onion-layers.css',
  };
  document.getElementById('theme-css').href = themes[key] || themes.green;
  document.documentElement.setAttribute('data-theme', key);
}
applyTheme(localStorage.getItem('swamp-theme') || 'green');
window.addEventListener('message', e => { if (e.data?.type === 'theme') applyTheme(e.data.key); });

// Mouse forwarding
document.addEventListener('mousemove', e => {
  try { window.parent.postMessage({ type: 'mousemove', x: e.clientX, y: e.clientY }, '*'); } catch(err) {}
});
document.addEventListener('mouseleave', () => {
  try { window.parent.postMessage({ type: 'mouseleave' }, '*'); } catch(err) {}
});

// Fetch helpers
async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${r.status} — ${url}`);
  return r.json();
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
// Escape a username for use inside an [data-user="…"] attribute selector
// (usernames can contain quotes/brackets). CSS.escape is in all current browsers.
function cssEscape(s) {
  return (window.CSS && CSS.escape) ? CSS.escape(s) : String(s).replace(/["\\\]]/g, '\\$&');
}

// ── DSP Dent? cross-reference ────────────────────────────────────────────────
// The backend (leaderboard.py update_dsp_dent_info) queries renton.report
// and stamps user.dsp_dent / user.dsp_chatter / user.renton_viewer_id into
// leaderboard.json on every refresh. We just read those fields directly here.
//
// Glyph precedence:
//   💵  has donated to DSP        (dsp_dent)
//   💬  has chatted in DSP's stream but not donated  (dsp_chatter only)
//   ❌  neither, or not found on renton

function dspDentGlyph(row) {
  if (row.dsp_dent)    return '💵';
  if (row.dsp_chatter) return '💬';
  return '❌';
}

function dspDentCell(row) {
  const glyph = dspDentGlyph(row);
  if (row.renton_viewer_id) {
    const href = `https://renton.report/viewers/${encodeURIComponent(row.renton_viewer_id)}`;
    return `<a href="${href}" target="_blank" rel="noopener noreferrer"
              title="View ${escHtml(row.username)} on renton.report">${glyph}</a>`;
  }
  return glyph;
}

// Sort state
let sortKey   = 'total';
let sortAsc   = false;
let tableData = [];

// Search state: case-insensitive substring filter on the donor username.
let searchQuery = '';

// Total column count of the outer table, used for the expanded detail row's
// colspan. Static (TYPES is fixed) so it lives at module scope — toggleDonor
// needs it to build a detail row without a full re-render.
const COLS = 5 + TYPES.length + 1;

// ── Windowed rendering ───────────────────────────────────────────────────────
// There are 4000+ donors. Putting every row in the DOM at once costs ~4s of
// style & layout on load (CSS containment can't help here — `content-visibility`
// is ignored on table-internal display types). So we render the sorted list in
// chunks: an initial batch big enough to fill the viewport, then more appended
// as the user scrolls toward the bottom. Sorting rebuilds from the first chunk.
const CHUNK = 100;          // donor rows appended per batch
let sortedRows    = [];     // the full sorted donor list (all rows live here…)
let renderedCount = 0;      // …but only this many are currently in the DOM

// ── Expandable per-donor donations ───────────────────────────────────────────
// dents loads only leaderboard.json (aggregates) on page load. The individual
// donations behind each donor live in data/donor_donations.json (built by the
// backend, keyed by the same normalized username as leaderboard.json). That file
// is large, so we lazy-load it once -- only when the first row is expanded -- and
// cache it for the session.
const expanded   = new Set();   // usernames whose detail panel is open
let donorData    = null;        // the parsed donor_donations.json, once fetched
let donorPromise = null;        // in-flight fetch (dedupes concurrent expands)
let donorError   = null;        // message if the fetch failed

function ensureDonorData() {
  if (donorData) return Promise.resolve(donorData);
  if (!donorPromise) {
    donorPromise = fetchJSON(`${RAW}/data/donor_donations.json`)
      .then(d => { donorData = d; donorError = null; refreshOpenPanels(); return d; })
      .catch(e => { donorError = e.message; donorPromise = null; refreshOpenPanels(); });
  }
  return donorPromise;
}

// Re-render the inner panel of every currently-open donor in place. Called once
// after donor_donations.json finishes loading (the panels were showing a
// "loading…" placeholder) — far cheaper than rebuilding the whole 4000-row table.
function refreshOpenPanels() {
  const wrap = document.getElementById('tableWrap');
  wrap.querySelectorAll('tbody.dent-group > tr.donations-row .donor-panel').forEach(panel => {
    const tb = panel.closest('tbody.dent-group');
    if (tb && tb.dataset.user != null) {
      panel.innerHTML = donorPanelInner(tb.dataset.user);
      fillDonorPanel(panel, tb.dataset.user);
    }
  });
}

function fmtUSD(n) {
  return n > 0 ? '$' + n.toFixed(2) : '—';
}

function fmtDateTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts * 1000);
  const opts = { month: '2-digit', day: '2-digit', year: '2-digit' };
  const tOpts = { hour: 'numeric', minute: '2-digit' };
  // Honor the dashboard's timezone config if config.js provides withTZ.
  const tz = (typeof withTZ === 'function') ? withTZ : (o => o);
  return d.toLocaleDateString('en-US', tz(opts)) + ' ' + d.toLocaleTimeString('en-US', tz(tOpts));
}

// ── VOD timestamp deep links (ported from streams.html) ──────────────────────
// Each donation links to the moment it happened in the rebroadcast VOD, using
// ts - start_ts as the offset. A normal stream has one youtube_archive_id; a
// split broadcast carries a `segments` array; a durable archive also has an
// archive.org mirror anchored at archive_start_ts.
function fmtElapsed(startTs, ts) {
  const s = Math.max(0, Math.floor(ts - startTs));
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return h > 0
    ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
    : `${m}:${String(sec).padStart(2,'0')}`;
}

function buildVodLink(seg, tSec) {
  if (seg.archive_id)
    return `https://youtu.be/${encodeURIComponent(seg.archive_id)}?t=${tSec}`;
  if (seg.archive_org_id)
    return `https://archive.org/embed/${encodeURIComponent(seg.archive_org_id)}?start=${tSec}`;
  return null;
}

// Resolve the segment list for a stream's meta (mirrors streams.html: prefer an
// explicit `segments` array, else synthesize a single segment from the archive
// ids anchored at archive_start_ts ?? start_ts).
function streamSegments(smeta) {
  if (!smeta) return [];
  if (Array.isArray(smeta.segments) && smeta.segments.length)
    return [...smeta.segments].sort((a, b) => a.start_ts - b.start_ts);
  if (smeta.youtube_archive_id || smeta.archive_org_id)
    return [{ archive_id: smeta.youtube_archive_id || null,
              archive_org_id: smeta.archive_org_id || null,
              start_ts: smeta.archive_start_ts != null ? smeta.archive_start_ts : smeta.start_ts }];
  return [];
}

// The last segment that had started by ts, clamped to the first for any donation
// predating all of them.
function segmentFor(segments, ts) {
  let chosen = segments[0] || null;
  for (const seg of segments) {
    if (seg.start_ts <= ts) chosen = seg;
    else break;
  }
  return chosen;
}

// The Timestamp cell: elapsed H:MM:SS into the stream, linking into the VOD when
// an archive id is available, otherwise plain text.
function timestampCell(smeta, ts) {
  const startTs = smeta && smeta.start_ts;
  const label = startTs ? fmtElapsed(startTs, ts) : '—';
  const seg = segmentFor(streamSegments(smeta), ts);
  if (seg && seg.start_ts != null) {
    const tSec = Math.max(0, Math.floor(ts - seg.start_ts));
    const href = buildVodLink(seg, tSec);
    if (href) {
      return `<a class="ts-link" href="${href}" target="_blank" rel="noopener noreferrer">${label}</a>`;
    }
  }
  return label;
}

// One donation's <tr> for the itemized sub-table.
function donationRowHTML(d, streams) {
  const sid   = d.stream_id;
  const smeta = sid && streams[sid];
  const label = (smeta && smeta.title) ? smeta.title : (sid || '—');
  const streamCell = sid
    ? `<a class="stream-link" href="streams.html#${encodeURIComponent(sid)}" target="_blank" rel="noopener" title="${escHtml(label)}">${escHtml(label)}</a>`
    : '—';
  const tsCell = smeta ? timestampCell(smeta, d.ts) : '—';
  const type = d.type || '';
  const amt  = (d.amount_usd != null && d.amount_usd > 0)
    ? fmtUSD(d.amount_usd)
    : (d.amount_raw ? escHtml(String(d.amount_raw)) : '—');
  const msg  = d.message ? escHtml(d.message) : '';
  return `<tr>
      <td class="ts-cell">${fmtDateTime(d.ts)}</td>
      <td>${streamCell}</td>
      <td class="ts-cell">${tsCell}</td>
      <td><span class="type-badge type-${escHtml(type)}">${escHtml(type) || '—'}</span></td>
      <td class="amount-usd">${amt}</td>
      <td class="msg-cell">${msg}</td>
    </tr>`;
}

// A heavy donor can have 1800+ donations; rendering them all in one synchronous
// pass is the lag you see on expand. So a panel renders only its first batch up
// front (instant), tags the sub-table with the full count, and the rest are
// appended across animation frames by fillDonorPanel() — no single long task.
const SUB_FIRST = 60;   // rows rendered synchronously when a panel opens
const SUB_MORE  = 200;  // rows appended per animation frame thereafter

// Inner HTML of a donor's `.donor-panel`: a load/empty status, or the donations
// sub-table seeded with up to SUB_FIRST rows (data-total carries the real count
// so fillDonorPanel knows there's more to append).
function donorPanelInner(username) {
  if (!donorData) {
    if (donorError) return `<div class="donor-empty">couldn't load donations — ${escHtml(donorError)}</div>`;
    return `<div class="donor-loading"><span class="loading-glyph" style="font-size:18px;">~</span> loading donations…</div>`;
  }
  const recs = (donorData.donors && donorData.donors[username]) || [];
  if (!recs.length) return `<div class="donor-empty">No itemized donations recorded.</div>`;

  const streams = donorData.streams || {};
  const first = recs.slice(0, SUB_FIRST).map(d => donationRowHTML(d, streams)).join('');
  return `<table class="donations-table" data-total="${recs.length}">
    <thead><tr><th>Date</th><th>Stream</th><th>Timestamp</th><th>Type</th><th>Amount</th><th>Message</th></tr></thead>
    <tbody>${first}</tbody>
  </table>`;
}

// Progressively append the remaining donation rows of an open panel, a frame at
// a time. Each run is tagged on the <tbody> so collapsing the panel (or a later
// re-fill) supersedes an in-flight one; it also continues from however many rows
// are already present, so it's safe to call repeatedly.
function fillDonorPanel(panel, username) {
  if (!donorData) return;
  const body = panel.querySelector('table.donations-table > tbody');
  if (!body) return;
  const recs = (donorData.donors && donorData.donors[username]) || [];
  const streams = donorData.streams || {};
  const myGen = (body.__fillGen = (body.__fillGen || 0) + 1);
  function step() {
    if (body.__fillGen !== myGen || !body.isConnected) return;   // superseded / collapsed
    const start = body.children.length;
    if (start >= recs.length) return;
    const end = Math.min(start + SUB_MORE, recs.length);
    let html = '';
    for (let i = start; i < end; i++) html += donationRowHTML(recs[i], streams);
    body.insertAdjacentHTML('beforeend', html);
    if (end < recs.length) requestAnimationFrame(step);
  }
  if (body.children.length < recs.length) requestAnimationFrame(step);
}

// Toggle a donor's panel open/closed, lazy-loading the data on first open.
// Updates only the affected donor's <tbody> in place — rebuilding the whole
// 4000-row table here is what made expanding a heavy donor (1800+ donations)
// visibly lag, since it re-stringified and re-laid-out every other row too.
function toggleDonor(username) {
  const opening = !expanded.has(username);
  if (opening) {
    expanded.add(username);
    ensureDonorData();   // fire-and-forget; refreshes this panel when it resolves
  } else {
    expanded.delete(username);
  }

  const wrap = document.getElementById('tableWrap');
  const tb = [...wrap.querySelectorAll('tbody.dent-group')]
    .find(t => t.dataset.user === username);
  if (!tb) { renderTable(); return; }   // fallback: row not found, full redraw

  const mainRow = tb.querySelector('tr.dent-row');
  mainRow.classList.toggle('sticky-dent', opening);
  const caret = mainRow.querySelector('.caret');
  if (caret) caret.textContent = opening ? '▾' : '▸';

  let detail = tb.querySelector('tr.donations-row');
  if (opening) {
    if (!detail) {
      detail = document.createElement('tr');
      detail.className = 'donations-row';
      detail.innerHTML = `<td colspan="${COLS}"><div class="donor-panel">${donorPanelInner(username)}</div></td>`;
      tb.appendChild(detail);
      fillDonorPanel(detail.querySelector('.donor-panel'), username);
    }
  } else if (detail) {
    detail.remove();
  }
}

function sortArrow(key) {
  if (key !== sortKey) return '';
  return `<span class="sort-arrow">${sortAsc ? '↑' : '↓'}</span>`;
}
function thClass(key) {
  return key === sortKey ? 'sorted' : '';
}

// The <tbody> markup for a single donor (main row + its detail panel if open).
// `i` is the donor's overall rank in the sorted list (for the rank cell).
function rowGroupHTML(row, i) {
  const typeCells = TYPES.map(t => {
    const v = row[t.key] || 0;
    return `<td class="amount-type${v === 0 ? ' zero' : ''}">${fmtUSD(v)}</td>`;
  }).join('');

  const isOpen = expanded.has(row.username);
  const caret  = `<span class="caret">${isOpen ? '▾' : '▸'}</span>`;

  const mainRow = `<tr class="dent-row${isOpen ? ' sticky-dent' : ''}" data-user="${escHtml(row.username)}">
      <td class="rank">${i + 1}</td>
      <td class="username">${caret}${escHtml(row.username)}</td>
      <td class="amount-total">${fmtUSD(row.total)}</td>
      <td class="amount-type">${row.streams}</td>
      <td class="amount-type">${row.donations || 0}</td>
      ${typeCells}
      <td class="dsp-dent">${dspDentCell(row)}</td>
    </tr>`;

  const detailRow = isOpen
    ? `<tr class="donations-row"><td colspan="${COLS}"><div class="donor-panel">${donorPanelInner(row.username)}</div></td></tr>`
    : '';

  // Each donor (main row + its detail panel) gets its own <tbody> so the
  // pinned/sticky main row is constrained to this section: it stays under the
  // header while its panel scrolls, then releases as the next donor scrolls up.
  // data-user lets toggleDonor find this section to update it in place.
  return `<tbody class="dent-group" data-user="${escHtml(row.username)}">${mainRow}${detailRow}</tbody>`;
}

// Append the next CHUNK of donor rows to the table (no-op once all are rendered).
function appendChunk() {
  if (renderedCount >= sortedRows.length) return;
  const table = document.querySelector('#tableWrap table');
  if (!table) return;
  const end = Math.min(renderedCount + CHUNK, sortedRows.length);
  let html = '';
  for (let i = renderedCount; i < end; i++) html += rowGroupHTML(sortedRows[i], i);
  table.insertAdjacentHTML('beforeend', html);
  // Any donor already expanded that landed in this chunk got only its first
  // batch of donations from rowGroupHTML — kick off the progressive fill.
  for (let i = renderedCount; i < end; i++) {
    const u = sortedRows[i].username;
    if (expanded.has(u)) {
      const panel = table.querySelector(`tbody.dent-group[data-user="${cssEscape(u)}"] .donor-panel`);
      if (panel) fillDonorPanel(panel, u);
    }
  }
  renderedCount = end;
}

// Keep appending until the list overflows its scroll container (so there's
// something to scroll), or every row is rendered. Guards against an infinite
// loop if measurements ever go sideways.
function fillViewport() {
  const wrap = document.getElementById('tableWrap');
  let guard = 0;
  while (renderedCount < sortedRows.length &&
         wrap.scrollHeight <= wrap.clientHeight + 300 &&
         guard++ < 100) {
    appendChunk();
  }
}

function renderTable() {
  const wrap = document.getElementById('tableWrap');
  if (!tableData.length) {
    wrap.innerHTML = '<div class="empty-state"><span class="loading-glyph" style="font-size:40px;">☽</span><span>no donations recorded yet</span></div>';
    return;
  }

  const base = searchQuery
    ? tableData.filter(u => u.username.toLowerCase().includes(searchQuery))
    : tableData;

  if (!base.length) {
    wrap.innerHTML = `<div class="empty-state"><span class="loading-glyph" style="font-size:40px;">☽</span><span>no dents match “${escHtml(searchQuery)}”</span></div>`;
    sortedRows = [];
    renderedCount = 0;
    return;
  }

  sortedRows = [...base].sort((a, b) => {
    if (sortKey === 'username') {
      const cmp = a.username.localeCompare(b.username, undefined, { sensitivity: 'base' });
      return sortAsc ? cmp : -cmp;
    }
    if (sortKey === 'dsp_dent') {
      // 3-tier rank: donor (2) > chatter only (1) > neither (0).
      const rank = u => u.dsp_dent ? 2 : u.dsp_chatter ? 1 : 0;
      const cmp  = rank(a) - rank(b);
      return sortAsc ? cmp : -cmp;
    }
    const av = a[sortKey] ?? 0;
    const bv = b[sortKey] ?? 0;
    return sortAsc ? av - bv : bv - av;
  });

  const typeHeaders = TYPES.map(t =>
    `<th class="${thClass(t.key)}" data-key="${t.key}">${escHtml(t.label)}${sortArrow(t.key)}</th>`
  ).join('');

  // Render only the header up front; rows are appended in chunks below. Resetting
  // scrollTop matters on re-sort so the (now reordered) first chunk is in view.
  renderedCount = 0;
  wrap.scrollTop = 0;
  wrap.innerHTML = `<table>
    <thead>
      <tr>
        <th style="width:36px;"></th>
        <th class="${thClass('username')}" data-key="username" style="min-width:160px;">Dent${sortArrow('username')}</th>
        <th class="${thClass('total')}" data-key="total">Total${sortArrow('total')}</th>
        <th class="${thClass('streams')}" data-key="streams">Streams${sortArrow('streams')}</th>
        <th class="${thClass('donations')}" data-key="donations">Donations${sortArrow('donations')}</th>
        ${typeHeaders}
        <th class="${thClass('dsp_dent')}" data-key="dsp_dent" title="renton.report: 💵 has donated to DSP, 💬 has chatted in DSP's stream, ❌ neither / not found">DSP Dent?${sortArrow('dsp_dent')}</th>
      </tr>
    </thead>
  </table>`;

  appendChunk();
  fillViewport();

  // The sticky donor row pins just below the (sticky) header; measure the
  // header's rendered height so the pin sits flush under it across themes.
  const thd = wrap.querySelector('thead');
  if (thd) document.documentElement.style.setProperty('--thead-h', thd.offsetHeight + 'px');
}

// Click handling is delegated to the persistent #tableWrap container, attached
// once — not re-bound per row on every render. With 4000+ rows, attaching a
// listener to each was a large chunk of render cost and re-ran on every redraw.
let delegationReady = false;
function setupDelegation() {
  if (delegationReady) return;
  delegationReady = true;
  const wrap = document.getElementById('tableWrap');
  wrap.addEventListener('click', e => {
    // Sort on header click.
    const th = e.target.closest('th[data-key]');
    if (th) {
      const key = th.dataset.key;
      if (key === sortKey) {
        sortAsc = !sortAsc;
      } else {
        sortKey = key;
        // Username sorts a→z by default, numbers sort greatest first.
        sortAsc = key === 'username';
      }
      renderTable();
      return;
    }
    // Ignore clicks on links inside a row (e.g. the renton.report DSP-dent
    // link) so they navigate instead of toggling the panel.
    if (e.target.closest('a')) return;
    // Expand/collapse a donor's itemized donations on row click.
    const tr = e.target.closest('tr.dent-row');
    if (tr) toggleDonor(tr.dataset.user);
  });

  // Live search: filter the donor list by username as the user types. Re-render
  // is cheap (renderTable only lays out the first chunk synchronously, then
  // windows the rest) so no debounce is needed; it also resets scrollTop, which
  // is the desired behavior on a new query.
  const search = document.getElementById('dentSearch');
  if (search) {
    search.addEventListener('input', e => {
      searchQuery = e.target.value.trim().toLowerCase();
      renderTable();
    });
  }

  // Windowed rendering: append the next chunk of donor rows as the user nears
  // the bottom of the scroll container, so the DOM grows on demand instead of
  // holding all 4000+ rows from the start.
  wrap.addEventListener('scroll', () => {
    if (renderedCount >= sortedRows.length) return;
    if (wrap.scrollTop + wrap.clientHeight >= wrap.scrollHeight - 600) appendChunk();
  }, { passive: true });
}

// Build tableData from a precomputed leaderboard.json object
function loadFromLeaderboard(board) {
  const users = board.users || {};
  tableData = Object.values(users).filter(u => u.total > 0);
}

async function load() {
  const wrap = document.getElementById('tableWrap');
  try {
    // dents reads only the precomputed leaderboard.json (maintained by
    // github_sync._update_leaderboard; repair with rebuild_leaderboard.py).
    // We intentionally do NOT fall back to aggregating every stream's
    // events.jsonl -- at hundreds of streams that fan-out would fire hundreds
    // of fetches (~tens of MB) and hang the browser.
    const board = await fetchJSON(`${RAW}/data/leaderboard.json`);
    loadFromLeaderboard(board);
    setupDelegation();
    renderTable();
  } catch (e) {
    wrap.innerHTML = `<div class="error-state"><span class="loading-glyph">✕</span><span>couldn't load dents<br><small>${e.message}</small></span></div>`;
  }
}

load();
</script>
</body>
</html>
